        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1; 
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true); view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data'); view.setUint32(40, dataSize, true);

            const pcmArray = new Uint8Array(pcmData);
            new Uint8Array(buffer, 44).set(pcmArray);

            return new Blob([buffer], { type: 'audio/wav' });

            function writeString(view, offset, string) {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            }

                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    chunksRef.current = [];
                    mediaRecorder.ondataavailable = (e) => chunksRef.current.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                        setAudioUrl(URL.createObjectURL(blob));
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start(); setRecording(true);
                } catch (err) { showToast('Microphone access denied.'); }
            };

                setSyncStatus('saving');
                setEntries(prev => {
                    const updated = prev.map(e => String(e.id) === String(entry.id) ? entry : e);
                    if (!prev.find(e => String(e.id) === String(entry.id))) updated.push(entry);
                    return updated;
                });
                try { 
                    await setDoc(getDocument('entries', entry.id.toString()), entry); 
                    setSyncStatus('saved');
                    if (!isSilent) showToast('Memory saved securely');
                } catch(e) { 
                    setSyncStatus('error');
                    if (!isSilent) showToast('Save Error: Check Firestore Rules');
                }
            }, [user, getDocument, showToast]);

            useEffect(() => { saveEntryRef.current = saveEntry; }, [saveEntry]);

            useEffect(() => {
                const autoSaveInterval = setInterval(() => {
                    if (currentRouteRef.current === 'editor' && currentEntryRef.current && currentEntryRef.current.id) {
                        if (saveEntryRef.current) saveEntryRef.current(currentEntryRef.current, true);

            // Data Operations
            const deleteEntry = async (entryId) => {
                if (!user) return;
                const deletedItem = entries.find(e => String(e.id) === String(entryId)); 
                if (!deletedItem) {
                    showToast('Draft discarded');
                    return;
                }
                const trashedItem = { ...deletedItem, deletedAt: new Date().toISOString() };
                
                setEntries(prev => prev.filter(e => String(e.id) !== String(entryId)));
                setTrash(prev => [...prev, trashedItem]);

                try { 
                    await setDoc(getDocument('trash', entryId.toString()), trashedItem); 
                    await deleteDoc(getDocument('entries', entryId.toString())); 
                    showToast('Entry moved to trash');
                } catch(e) { console.error(e); showToast('Error moving to trash.'); }
            };
            
            const restoreEntry = async (entryId) => {
                if (!user) return;
                const itemToRestore = trash.find(e => String(e.id) === String(entryId)); 
                if (!itemToRestore) return;
                const { deletedAt, ...entry } = itemToRestore;
                
                setTrash(prev => prev.filter(e => String(e.id) !== String(entryId)));
                setEntries(prev => [...prev, entry]);

                try {

            const handleGeminiTTS = async () => {
                if (!currentEntry.content && !currentEntry.title) return showToast("Nothing to read.");
                if (isAILoading) return;
                setIsAILoading(true);
                showToast("Generating realistic voice ✨...");
                try {
                    const text = `${currentEntry.title || 'Untitled'}. \n\n ${currentEntry.content || ''}`.substring(0, 1200); 
                    const inlineData = await callGeminiTTS(text);
                    if (inlineData) {
                        const base64Data = inlineData.data;
                        const binaryString = window.atob(base64Data);
                        const len = binaryString.length;
                        const bytes = new Uint8Array(len);
                        for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
                        
                        const mimeMatch = inlineData.mimeType.match(/rate=(\d+)/);
                        const sampleRate = mimeMatch ? parseInt(mimeMatch[1], 10) : 24000;
                        
                        const wavBlob = pcmToWav(bytes.buffer, sampleRate);
                        const audioUrl = URL.createObjectURL(wavBlob);
                        if (audioRef.current) {
                            audioRef.current.pause();
                            URL.revokeObjectURL(audioRef.current.src);
                        }
                        audioRef.current = new Audio(audioUrl);
                        audioRef.current.play();
                        showToast("Playing AI Voice ✨");
                    } else {
                        throw new Error("No data");
                    }
                } catch(e) {
                    console.error(e);
                    showToast("TTS failed. Falling back to native.");
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();

            const generatePrompt = () => { setCurrentEntry(prev => ({ ...prev, content: `**Prompt:** *${writingPrompts[Math.floor(Math.random() * writingPrompts.length)]}*\n\n` + (prev.content || '') })); showToast('Inspiration added!'); };

            const handleAddTag = () => {
                const newTag = tagInput.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                if(newTag && !(currentEntry.tags||[]).includes(newTag)) {

            const handleCopyEntry = () => {
                const text = `# ${currentEntry.title || 'Untitled'}\n\n*Date: ${new Date(currentEntry.date).toLocaleDateString()}*\n\n${currentEntry.content}`;
                
                const copyToClipboard = async () => {
                    if (navigator.clipboard && window.isSecureContext) {
                        try {
                            await navigator.clipboard.writeText(text);
                            showToast('Copied to clipboard!');
                            return;
                        } catch (err) {
                            console.warn("Clipboard API failed, falling back", err);
                        }
                    }
                    
                    // Fallback to legacy execCommand
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-999999px";
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showToast('Copied to clipboard!');
                    } catch (err) {
                        showToast('Copy failed.');
                    }
                    document.body.removeChild(textArea);

                copyToClipboard();

            if (authLoading) return <div className="min-h-screen flex items-center justify-center bg-obsidian"><div className="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div></div>;

                                                        <div className="text-center flex-1"><span className="text-4xl md:text-5xl mb-4 block drop-shadow-lg">😊</span><p className="text-sm md:text-base font-black text-green-400 uppercase tracking-[0.2em]">{Math.round((h/t)*100)}%</p></div>
                                                        <div className="w-[1px] h-20 bg-white/10"></div>
                                                        <div className="text-center flex-1"><span className="text-4xl md:text-5xl mb-4 block drop-shadow-lg">😐</span><p className="text-sm md:text-base font-black text-gray-400 uppercase tracking-[0.2em]">{Math.round((n/t)*100)}%</p></div>
                                                        <div className="w-[1px] h-20 bg-white/10"></div>
                                                        <div className="text-center flex-1"><span className="text-4xl md:text-5xl mb-4 block drop-shadow-lg">😢</span><p className="text-sm md:text-base font-black text-red-400 uppercase tracking-[0.2em]">{Math.round((s/t)*100)}%</p></div>
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- TRASH --- */}
                        {currentRoute === 'trash' && (
                            <div className="max-w-6xl mx-auto py-10 sm:py-16 animate-fadeIn relative z-10">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-12 gap-8">
                                    <div>
                                        <h2 className="text-4xl md:text-5xl font-black tracking-tight text-white drop-shadow-md">Recycle Bin</h2>
                                        <p className="text-gray-400 font-medium mt-3 text-base">{trash.length} items waiting for permanent deletion.</p>
                                    </div>
                                    {trash.length > 0 && <button onClick={() => setDeleteModal({ isOpen: true, payload: null, type: 'empty-trash' })} className="w-full sm:w-auto px-8 py-4 bg-red-500 hover:bg-red-600 rounded-2xl text-white font-bold shadow-[0_10px_30px_rgba(239,68,68,0.4)] border border-red-400/30 transition-transform hover:scale-105 flex items-center justify-center gap-3 text-base"><i className="fas fa-fire text-lg"></i> Empty Bin</button>}
                                </div>
                                
                                {trash.length === 0 ? (
                                    <div className="text-center py-32 sm:py-40 glass-panel mx-1 sm:mx-0 shadow-2xl border-dashed border-2 border-white/20 rounded-[3rem]">
                                        <div className="w-28 h-28 sm:w-32 sm:h-32 rounded-full bg-white/5 border border-white/10 flex items-center justify-center mx-auto mb-8 shadow-inner"><i className="fas fa-trash-can text-5xl sm:text-6xl text-gray-500 drop-shadow-md"></i></div>
                                        <h3 className="text-3xl sm:text-4xl font-black text-white">It's completely clean here</h3>
                                    </div>
                                ) : (
                                    <div className="space-y-5">
                                        {trash.map((entry, index) => (
                                            <div key={entry.id} style={{animationDelay: `${index * 50}ms`}} className="animate-fadeIn glass-panel p-6 sm:p-8 flex flex-col md:flex-row justify-between md:items-center gap-6 group hover:bg-[rgba(35,35,45,0.8)] transition-all duration-300 shadow-xl border-l-[4px] border-l-red-500">
                                                <div className="min-w-0">
                                                    <h3 className="font-bold text-2xl sm:text-3xl mb-3 text-white truncate tracking-tight">{entry.title || 'Untitled'}</h3>
                                                    <p className="text-sm text-red-400 font-bold bg-red-500/10 border border-red-500/20 inline-block px-4 py-2 rounded-xl shadow-inner"><i className="far fa-clock mr-2"></i> Deleted: {new Date(entry.deletedAt).toLocaleDateString()}</p>
                                                </div>
                                                <div className="flex gap-4 w-full md:w-auto">
                                                    <button onClick={() => restoreEntry(entry.id)} className="flex-1 md:flex-none px-6 sm:px-8 py-3.5 sm:py-4 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 rounded-2xl font-bold transition-all hover:scale-105 text-sm sm:text-base flex items-center justify-center"><i className="fas fa-rotate-left mr-2.5"></i> Restore</button>
                                                    <button onClick={() => permanentlyDeleteEntry(entry.id)} className="flex-1 md:flex-none px-6 sm:px-8 py-3.5 sm:py-4 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-2xl font-bold transition-all hover:scale-105 text-sm sm:text-base flex items-center justify-center"><i className="fas fa-trash-can mr-2.5"></i> Delete Forever</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* --- SETTINGS MODAL --- */}
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay flex justify-end z-[9000] font-modern">
                            <div className="bg-[#050507]/90 backdrop-blur-[60px] border-l border-white/10 p-6 sm:p-10 md:p-12 w-full max-w-lg h-full shadow-[-40px_0_80px_rgba(0,0,0,0.8)] overflow-y-auto hide-scrollbar pb-[env(safe-area-inset-bottom)] animate-fadeIn relative">
                                
                                <div className="absolute top-0 left-0 w-2 h-full bg-gradient-to-b from-blue-500 via-purple-500 to-pink-500"></div>

                                <div className="flex justify-between items-center mb-12 border-b border-white/10 pb-8 mt-6">
                                    <h2 className="text-4xl font-black text-white tracking-tight">Settings</h2>
                                    <button onClick={() => setShowSettings(false)} className="w-14 h-14 glass-button rounded-full flex items-center justify-center text-white shrink-0 hover:bg-white/10 hover:rotate-90 transition-all shadow-inner"><i className="fas fa-times text-2xl"></i></button>
                                </div>
                                
                                <div className="space-y-10 pb-16">
                                    <div className="glass-panel p-8 rounded-[2rem] shadow-2xl border-t border-white/20 bg-[rgba(20,20,25,0.6)]">
                                        <h3 className="text-xs font-black text-cyan-400 mb-8 uppercase tracking-[0.2em] flex items-center gap-3"><i className="fas fa-id-badge text-base"></i> Account Status</h3>
                                        <div>
                                            <div className="flex items-center gap-5 mb-8 bg-black/40 p-5 rounded-2xl border border-white/10 shadow-inner">
                                                <div className="w-16 h-16 rounded-full bg-cyan-500/20 border border-cyan-500/30 text-cyan-400 flex items-center justify-center text-2xl shrink-0 shadow-[inset_0_0_15px_rgba(34,211,238,0.2)]"><i className="fas fa-user"></i></div>
                                                <div className="overflow-hidden min-w-0">
                                                    <p className="font-bold text-white text-xl truncate mb-1">{user.displayName || 'Uday Kumar'}</p>
                                                    <p className="text-sm text-gray-400 truncate">{user.email || 'Cloud Linked Account'}</p>
                                                </div>
                                            </div>
                                            <button onClick={async () => { try { await signOut(auth); setShowSettings(false); } catch (e) { showToast("Failed to sign out."); } }} className="w-full py-4 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-2xl font-bold transition-colors shadow-inner flex items-center justify-center gap-3 text-base">
                                                <i className="fas fa-right-from-bracket"></i> Sign Out Securely
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="glass-panel p-8 rounded-[2rem] shadow-2xl border-t border-white/20 bg-[rgba(20,20,25,0.6)]">
                                        <h3 className="text-xs font-black text-blue-400 mb-8 uppercase tracking-[0.2em] flex items-center gap-3"><i className="fas fa-lock text-base"></i> Privacy Vault</h3>
                                        <p className="text-sm text-gray-300 mb-8 font-medium leading-relaxed">Require a secure 4-digit PIN to open the diary application and keep your memories private.</p>
                                        {appPin ? (
                                            <button onClick={() => { updateSetting('appPin', null); setAppPin(null); showToast('PIN Removed'); }} className="w-full py-4 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-2xl font-bold transition-colors text-base">Disable PIN Lock</button>
                                        ) : (
                                            <button onClick={() => { setPromptModal({ isOpen: true, title: 'Set 4-Digit PIN', placeholder: 'e.g. 1234', onConfirm: (p) => { if(p && /^\d{4}$/.test(p)) { updateSetting('appPin', p); setAppPin(p); showToast('Vault Locked'); } else showToast('Must be exactly 4 digits'); setPromptModal({isOpen: false}); }, onCancel: () => setPromptModal({isOpen: false}) }); }} className="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-bold shadow-[0_10px_30px_rgba(59,130,246,0.4)] transition-transform hover:scale-105 text-base border border-blue-400/30">Enable PIN Lock</button>
                                        )}
                                    </div>
                                    
                                    <div className="glass-panel p-8 rounded-[2rem] shadow-2xl border-t border-white/20 bg-[rgba(20,20,25,0.6)]">
                                        <h3 className="text-xs font-black text-purple-400 mb-8 uppercase tracking-[0.2em] flex items-center gap-3"><i className="fas fa-paintbrush text-base"></i> Appearance</h3>
                                        
                                        <label className="block text-sm text-white font-bold mb-4">Background Effect</label>
                                        <select value={bgEffect} onChange={(e) => { setBgEffect(e.target.value); updateSetting('bgEffect', e.target.value); }} className="w-full px-5 py-4 mb-8 bg-black/50 border border-white/10 rounded-2xl text-white font-bold cursor-pointer text-base shadow-inner outline-none focus:border-purple-500">
                                            <option value="birds" className="bg-obsidian">Origami Birds</option>
                                            <option value="net" className="bg-obsidian">Cyber Net</option>
                                            <option value="waves" className="bg-obsidian">Ocean Waves</option>
                                            <option value="none" className="bg-obsidian">Deep Dark (None)</option>
                                        </select>

                                        <label className="block text-sm text-white font-bold mb-4">Typography Style</label>
                                        <div className="flex gap-2 bg-black/50 p-2 rounded-2xl border border-white/10 mb-8 shadow-inner">
                                            {[{id:'modern', l:'Modern'}, {id:'academic', l:'Serif'}, {id:'typewriter', l:'Mono'}].map(f => (
                                                <button key={f.id} onClick={() => { setFontFamily(f.id); updateSetting('fontFamily', f.id); }} className={`flex-1 py-3 rounded-[1rem] text-sm font-bold transition-all ${fontFamily === f.id ? 'bg-white/15 text-white shadow-md border border-white/10' : 'text-gray-400 hover:text-white hover:bg-white/5'} font-${f.id}`}>{f.l}</button>
                                            ))}
                                        </div>

                                        <label className="block text-sm text-white font-bold mb-4">Diary Name</label>
                                        <input type="text" value={appName} onChange={(e) => { setAppName(e.target.value); updateSetting('appName', e.target.value); }} className="w-full px-5 py-4 mb-8 bg-black/50 border border-white/10 rounded-2xl text-white font-bold text-base shadow-inner outline-none focus:border-purple-500 transition-colors" />
                                        
                                        <label className="block text-sm text-white font-bold mb-4">Reader Text Size</label>
                                        <div className="flex gap-2 bg-black/50 p-2 rounded-2xl border border-white/10 shadow-inner">
                                            {['small', 'normal', 'large'].map(s => (
                                                <button key={s} onClick={() => { setTextSize(s); updateSetting('textSize', s); }} className={`flex-1 py-3 rounded-[1rem] text-sm font-bold transition-all capitalize ${textSize === s ? 'bg-white/15 text-white shadow-md border border-white/10' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>{s}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="glass-panel p-8 rounded-[2rem] shadow-2xl border-t border-white/20 bg-[rgba(20,20,25,0.6)]">
                                        <h3 className="text-xs font-black text-emerald-400 mb-8 uppercase tracking-[0.2em] flex items-center gap-3"><i className="fas fa-book text-base"></i> Notebooks</h3>
                                        <div className="flex flex-col gap-4 mb-8">
                                            {notebooks.map(nb => (
                                                <div key={nb} className="flex justify-between items-center px-5 py-4 bg-black/50 rounded-2xl border border-white/10 shadow-inner group transition-colors hover:border-emerald-500/30">
                                                    <span className="font-bold text-white text-base truncate mr-3"><i className="fas fa-hashtag text-gray-500 mr-3"></i>{nb}</span>
                                                    {nb !== 'Main Diary' && (
                                                        <button onClick={() => deleteNotebook(nb)} className="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-red-500/20 hover:text-red-400 transition-colors shrink-0 opacity-0 group-hover:opacity-100" data-tooltip="Delete Notebook" data-tooltip-pos="left"><i className="fas fa-trash text-sm"></i></button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { 
                                            setPromptModal({ 
                                                isOpen: true, title: 'New Notebook Name', placeholder: 'e.g. Dreams',
                                                onConfirm: (n) => { 
                                                    if(n && !notebooks.includes(n)) { const newNbs = [...notebooks, n]; setNotebooks(newNbs); updateSetting('notebooks', newNbs); showToast('Notebook added'); } 
                                                    setPromptModal({isOpen: false});
                                                }, onCancel: () => setPromptModal({isOpen: false}) 
                                            }); 
                                        }} className="w-full py-4 glass-button rounded-2xl text-white font-bold transition-all hover:bg-white/10 text-base flex items-center justify-center gap-2 border border-white/10"><i className="fas fa-plus text-emerald-400"></i> Add Notebook</button>
                                    </div>
                                    
                                    <div className="glass-panel p-8 rounded-[2rem] shadow-2xl border-t border-white/20 bg-[rgba(20,20,25,0.6)]">
                                        <h3 className="text-xs font-black text-orange-400 mb-8 uppercase tracking-[0.2em] flex items-center gap-3"><i className="fas fa-database text-base"></i> Data Management</h3>
                                        <div className="grid grid-cols-2 gap-4 mb-8">
                                            <button onClick={() => { exportEntries(); setShowSettings(false); }} className="py-5 bg-black/50 hover:bg-white/10 border border-white/10 rounded-2xl text-white font-bold transition-colors flex flex-col items-center gap-3 text-base shadow-inner group"><i className="fas fa-cloud-arrow-down text-3xl text-blue-400 group-hover:scale-110 transition-transform"></i> Export JSON</button>
                                            <button onClick={() => { importEntries(); setShowSettings(false); }} className="py-5 bg-black/50 hover:bg-white/10 border border-white/10 rounded-2xl text-white font-bold transition-colors flex flex-col items-center gap-3 text-base shadow-inner group"><i className="fas fa-cloud-arrow-up text-3xl text-emerald-400 group-hover:scale-110 transition-transform"></i> Import JSON</button>
                                        </div>
                                        <div className="border-t border-red-500/20 pt-8 mt-4">
                                            <button onClick={() => setDeleteModal({ isOpen: true, payload: null, type: 'clear-all' })} className="w-full py-5 bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-50 hover:text-white transition-all hover:scale-[1.02] rounded-2xl font-black uppercase tracking-[0.1em] shadow-inner flex items-center justify-center gap-3 text-sm">
                                                <i className="fas fa-skull-crossbones text-lg"></i> Factory Reset
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Modals Container */}
                    {showTemplateModal && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9000] p-4 font-modern animate-fadeIn">
                            <div className="glass-panel p-8 sm:p-12 max-w-lg w-full shadow-[0_30px_60px_rgba(0,0,0,0.8)] text-white relative overflow-hidden max-h-[90vh] overflow-y-auto hide-scrollbar border-t border-white/20">
                                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black tracking-tight"><i className="fas fa-layer-group text-indigo-400 mr-4"></i> Templates</h2>
                                    <button onClick={() => setShowTemplateModal(false)} className="w-12 h-12 glass-button rounded-full shrink-0 hover:bg-white/10 transition-colors"><i className="fas fa-times text-lg"></i></button>
                                </div>
                                <div className="space-y-4">
                                    {diaryTemplates.map(t => <button key={t.name} onClick={() => insertTemplate(t)} className="w-full text-left p-6 bg-black/40 hover:bg-indigo-500/20 border border-white/10 hover:border-indigo-500/40 rounded-[1.5rem] font-bold text-lg transition-all shadow-inner truncate hover:scale-[1.02]">{t.name}</button>)}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <PromptModal isOpen={promptModal.isOpen} title={promptModal.title} placeholder={promptModal.placeholder} onConfirm={promptModal.onConfirm} onCancel={promptModal.onCancel} />
                    
                    <Modal 
                        isOpen={deleteModal.isOpen} 
                        title="Confirm Action" 
                        message={
                            deleteModal.type === 'empty-trash' ? 'Are you sure you want to permanently delete all items in the trash? This cannot be undone.' : 
                            deleteModal.type === 'clear-all' ? 'DANGER: You are about to permanently wipe ALL notebooks, entries, and trash. This cannot be undone.' :
                            'Are you sure you want to move this entry to the trash?'
                        } 
                        onConfirm={() => { 
                            if (deleteModal.type === 'empty-trash') emptyTrash(); 
                            else if (deleteModal.type === 'clear-all') clearAllData();
                            else { deleteEntry(deleteModal.payload); setCurrentEntry(null); setCurrentRoute('dashboard'); } 
                            setDeleteModal({ isOpen: false, payload: null, type: '' }); 
                        }} 
                        onCancel={() => setDeleteModal({ isOpen: false, payload: null, type: '' })} 
                        confirmText={deleteModal.type === 'empty-trash' ? "Empty Trash" : deleteModal.type === 'clear-all' ? "Wipe Data" : "Move to Trash"} 
                        isDangerous 
                    />
                    
                    {toastMessage && <Toast message={toastMessage} />}
                    {showZenMode && <ZenMode onClose={() => setShowZenMode(false)} />}
                    {showDrawing && <DrawingCanvas onSave={url => { setCurrentEntry({...currentEntry, images: [...(currentEntry.images||[]), url]}); showToast('Doodle saved to entry'); }} onClose={() => setShowDrawing(false)} />}
                    {showVoiceRecorder && <VoiceRecorder onSave={data => { setCurrentEntry({...currentEntry, audioMemo: data}); showToast('Audio memo saved to entry'); }} onClose={() => setShowVoiceRecorder(false)} showToast={showToast} />}

                    {/* GLOBAL TOOLTIP RENDERER */}
                    {globalTooltip && (
                        <div 
                            className="hidden md:flex fixed z-[99999] pointer-events-none transition-opacity duration-200 animate-fadeIn"
                            style={{
                                left: globalTooltip.x,
                                top: globalTooltip.y,
                                transform: globalTooltip.pos === 'left' ? 'translate(-100%, -50%)' : 
                                           globalTooltip.pos === 'bottom' ? 'translate(-50%, 0)' : 
                                           'translate(-50%, -100%)',
                            }}
                        >
                            <div className="px-3 py-1.5 bg-[rgba(15,15,20,0.95)] backdrop-blur-xl border border-white/10 rounded-lg text-xs font-bold text-white shadow-[0_10px_30px_rgba(0,0,0,0.8)] whitespace-nowrap">
                                {globalTooltip.text}
                            </div>
                        </div>
                    )}

                </div>
            );
        };
        
        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>

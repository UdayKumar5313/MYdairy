        const callGeminiAPI = async (prompt, systemInstruction = null) => {

        const callGeminiTTS = async (textToSpeak) => {

            const payload = {

            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < 5; i++) {
                try {

        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1; 
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true); view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data'); view.setUint32(40, dataSize, true);

            const pcmArray = new Uint8Array(pcmData);
            new Uint8Array(buffer, 44).set(pcmArray);

            return new Blob([buffer], { type: 'audio/wav' });

            function writeString(view, offset, string) {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return <div className="p-10 text-white bg-red-900 min-h-screen flex flex-col items-center justify-center">

                        <pre className="bg-black/50 p-4 rounded-xl text-sm max-w-2xl overflow-auto">{this.state.error.toString()}</pre>
                    </div>;
                }
                return this.props.children;
            }
        }

        // --- Content Defaults ---

            { name: "Daily Reflection", content: "### What went well today:\n\n### What could have gone better:\n\n### What I learned:\n\n### Mood summary:\n" }
        ];

        // --- Fast UI Components ---
        const Toast = ({ message }) => {

        const Modal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = 'Confirm', cancelText = 'Cancel', isDangerous = false }) => {

                            <button onClick={onCancel} className="px-5 py-2.5 rounded-xl glass-button text-sm font-medium">{cancelText}</button>
                            <button onClick={onConfirm} className={`px-5 py-2.5 rounded-xl text-white font-bold text-sm shadow-lg transition-transform hover:scale-105 ${isDangerous ? 'bg-red-500 hover:bg-red-600 shadow-red-500/30' : 'bg-blue-500 hover:bg-blue-600 shadow-blue-500/30'}`}>{confirmText}</button>
                        </div>
                    </div>
                </div>
            );
        };

        const PromptModal = ({ isOpen, title, onConfirm, onCancel, placeholder="Enter value..." }) => {
            const [val, setVal] = useState('');
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9999] p-4">
                    <div className="glass-panel p-8 max-w-sm w-full text-white relative overflow-hidden">

                        </div>
                    </div>
                </div>
            );
        }
        
        const DrawingCanvas = ({ onSave, onClose }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    canvas.width = window.innerWidth; canvas.height = window.innerHeight - 100;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }, []);
            const getCoordinates = (e) => (e.touches && e.touches.length > 0) ? { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY } : { clientX: e.nativeEvent.clientX, clientY: e.nativeEvent.clientY };
            const startDrawing = (e) => {
                setIsDrawing(true);
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();
                const { clientX, clientY } = getCoordinates(e);
                ctx.beginPath(); ctx.moveTo(clientX - rect.left, clientY - rect.top);
            };
            const draw = (e) => {
                if (!isDrawing) return;
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();
                const { clientX, clientY } = getCoordinates(e);
                ctx.lineTo(clientX - rect.left, clientY - rect.top);
                ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.stroke();
            };
            const stopDrawing = () => setIsDrawing(false);
            return (
                <div className="fixed inset-0 modal-overlay z-[9000] flex flex-col p-4 sm:p-8">
                    <div className="flex justify-between items-center p-5 glass-panel rounded-b-none border-b-0 shadow-none">

                            <button onClick={() => { onSave(canvasRef.current.toDataURL('image/png')); onClose(); }} className="px-5 py-2 bg-blue-500 hover:bg-blue-600 rounded-full text-white font-bold shadow-lg shadow-blue-500/30">Save</button>

                        </div>
                    </div>
                    <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} className="cursor-crosshair flex-1 touch-none glass-panel rounded-t-none border-t-0 bg-black/30"></canvas>
                </div>

        };

        const ZenMode = ({ onClose }) => {
            const [text, setText] = useState('Breathe In');
            useEffect(() => {

        const VoiceRecorder = ({ onSave, onClose, showToast }) => {
            const [recording, setRecording] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const mediaRecorderRef = useRef(null);
            const streamRef = useRef(null);
            const chunksRef = useRef([]);
            
            const startRecording = async () => {
                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showToast('Microphone access is not supported here.'); return; }
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    chunksRef.current = [];
                    mediaRecorder.ondataavailable = (e) => chunksRef.current.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                        setAudioUrl(URL.createObjectURL(blob));
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start(); setRecording(true);
                } catch (err) { showToast('Microphone access denied.'); }
            };
            const stopRecording = () => { if (mediaRecorderRef.current) { mediaRecorderRef.current.stop(); setRecording(false); } };
            const handleSave = async () => {
                if (audioUrl) {
                    const response = await fetch(audioUrl); const blob = await response.blob();
                    const reader = new FileReader();
                    reader.onload = (e) => { onSave(e.target.result); onClose(); };
                    reader.readAsDataURL(blob);

            };
            
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9000] p-4">
                    <div className="glass-panel p-10 max-w-sm w-full text-white text-center">
                        <div className="w-16 h-16 rounded-full bg-red-500/20 text-red-400 flex items-center justify-center mx-auto mb-6 text-2xl"><i className="fas fa-microphone-lines"></i></div>
                        <h2 className="text-2xl font-bold mb-8">Voice Memo</h2>
                        <div className="flex justify-center mb-10">
                            <button onClick={recording ? stopRecording : startRecording} className={`w-28 h-28 rounded-full flex items-center justify-center shadow-2xl transition-all duration-300 ${recording ? 'bg-red-500 animate-pulse shadow-[0_0_40px_rgba(239,68,68,0.6)] scale-110' : 'glass-button'}`}>
                                <i className={`fas ${recording ? 'fa-stop' : 'fa-microphone'} text-4xl ${recording ? 'text-white' : 'text-gray-300'}`}></i>
                            </button>
                        </div>
                        {audioUrl && <audio controls src={audioUrl} className="w-full mb-8 outline-none rounded-full glass-input"></audio>}
                        <div className="flex gap-4">
                            <button onClick={onClose} className="flex-1 py-3 glass-button rounded-xl font-bold text-sm">Cancel</button>
                            {audioUrl && <button onClick={handleSave} className="flex-1 py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-green-500/30 transition-transform hover:scale-105">Save</button>}
                        </div>
                    </div>
                </div>
            );
        };
        
        const getYouTubeEmbedUrl = (url) => {
            if (!url) return null;
            const regExp = /^(?:https?:\/\/)?(?:www\.)?(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|shorts\/))((\w|-){11})(?:\S+)?$/;
            const match = url.match(regExp);
            return (match && match[1].length === 11) ? `https://www.youtube.com/embed/${match[1]}` : null;
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            // App & Network State
            const [user, setUser] = useState(null);
            
            const getColl = useCallback((colName) => {
                return typeof __firebase_config !== 'undefined' 
                    ? collection(db, 'artifacts', appId, 'users', user.uid, colName) 
                    : collection(db, 'users', user.uid, colName);
            }, [user]);

            const getDocument = useCallback((colName, docId) => {
                return typeof __firebase_config !== 'undefined' 
                    ? doc(db, 'artifacts', appId, 'users', user.uid, colName, docId) 
                    : doc(db, 'users', user.uid, colName, docId);
            }, [user]);

            // Auth UI State
            const [authMode, setAuthMode] = useState('login'); 
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authName, setAuthName] = useState('');
            const [authLoading, setAuthLoading] = useState(true);
            
            // Navigation & UI State
            const [currentRoute, setCurrentRoute] = useState('dashboard');
            const [toastMessage, setToastMessage] = useState('');
            const showToast = useCallback((msg) => setToastMessage(msg), []);
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString());
            const [viewMode, setViewMode] = useState('grid');
            const [focusMode, setFocusMode] = useState(false); // Editor Focus
            const [readerFocus, setReaderFocus] = useState(false); // Reader Focus
            const [isAILoading, setIsAILoading] = useState(false); // Gemini loading state
            
            // Core Preferences / Settings from Cloud
            const [appName, setAppName] = useState("Uday's Pro Diary");
            const [textSize, setTextSize] = useState('normal');
            const [fontFamily, setFontFamily] = useState('modern'); // modern, academic, typewriter
            const [bgEffect, setBgEffect] = useState('birds'); // birds, net, waves, none
            const [privacyMode, setPrivacyMode] = useState(false);
            
            const [appPin, setAppPin] = useState(null);
            const [isUnlocked, setIsUnlocked] = useState(true);
            const [pinInput, setPinInput] = useState('');

            // Data State
            const [entries, setEntries] = useState([]);
            const [trash, setTrash] = useState([]);
            const [notebooks, setNotebooks] = useState(['Main Diary', 'Travel', 'Work', 'Ideas']);
            const [currentNotebook, setCurrentNotebook] = useState('All');
            const [currentEntry, setCurrentEntry] = useState(null);
            
            // Feature States
            const [urlInputMode, setUrlInputMode] = useState(null);
            const [tempUrl, setTempUrl] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [sortBy, setSortBy] = useState('newest');
            const [showFavoritesOnly, setShowFavoritesOnly] = useState(false);
            const [syncStatus, setSyncStatus] = useState('saved'); // saving, saved, error
            const [pomoTime, setPomoTime] = useState(25 * 60);
            const [pomoActive, setPomoActive] = useState(false);
            const [pomoVisible, setPomoVisible] = useState(false);
            const [tagInput, setTagInput] = useState('');
            
            // Modals
            const [showDrawing, setShowDrawing] = useState(false);
            const [showVoiceRecorder, setShowVoiceRecorder] = useState(false); 
            const [showTemplateModal, setShowTemplateModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showZenMode, setShowZenMode] = useState(false);
            const [deleteModal, setDeleteModal] = useState({ isOpen: false, payload: null, type: '' });
            const [promptModal, setPromptModal] = useState({ isOpen: false });

            // Refs
            const vantaRef = useRef(null);
            const vantaEffectRef = useRef(null);
            const currentEntryRef = useRef(currentEntry);
            const currentRouteRef = useRef(currentRoute);
            const audioRef = useRef(null);

            // Quote of the day logic
            const quoteOfTheDay = useMemo(() => dailyQuotes[new Date().getDate() % dailyQuotes.length], []);

            useEffect(() => { const timer = setInterval(() => setCurrentTime(new Date().toLocaleTimeString()), 1000); return () => clearInterval(timer); }, []);

            // Pomodoro Timer Logic
            useEffect(() => {
                let interval;
                if (pomoActive && pomoTime > 0) {
                    interval = setInterval(() => setPomoTime(t => t - 1), 1000);
                } else if (pomoTime === 0 && pomoActive) {
                    setPomoActive(false);
                    showToast("Pomodoro complete! Take a 5 minute break.");
                }
                return () => clearInterval(interval);
            }, [pomoActive, pomoTime, showToast]);
            const formatPomo = (s) => `${Math.floor(s / 60)}:${('0' + (s % 60)).slice(-2)}`;

            // Pro Keyboard Shortcuts
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                        e.preventDefault();
                        if (currentRouteRef.current === 'editor' && currentEntryRef.current) {
                            saveEntryRef.current(currentEntryRef.current);
                            showToast('Manual Save Triggered');
                        }
                    }
                    if (e.key === 'Escape') {
                        if (pomoVisible) setPomoVisible(false);
                        if (showSettings) setShowSettings(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [showSettings, pomoVisible]);

            // Dynamic Background Engine
            useEffect(() => {
                if (vantaEffectRef.current) {
                    vantaEffectRef.current.destroy();
                    vantaEffectRef.current = null;
                }
                if (!window.VANTA || !vantaRef.current || !isUnlocked || bgEffect === 'none') return;
                
                let effectConfig = { el: vantaRef.current, mouseControls: true, touchControls: true, gyroControls: false };
                
                if (bgEffect === 'birds') {
                    vantaEffectRef.current = window.VANTA.BIRDS({...effectConfig, backgroundColor: 0x050505, color1: 0x3b82f6, color2: 0xa855f7, colorMode: "varianceGradient", quantity: 4.00, birdSize: 1.50 });
                } else if (bgEffect === 'net') {
                    vantaEffectRef.current = window.VANTA.NET({...effectConfig, color: 0x3b82f6, backgroundColor: 0x050505, points: 10, maxDistance: 20, spacing: 18});
                } else if (bgEffect === 'waves') {
                    vantaEffectRef.current = window.VANTA.WAVES({...effectConfig, color: 0x0f172a, waveHeight: 20, waveSpeed: 0.5, zoom: 0.8 });
                }
            }, [isUnlocked, currentRoute, bgEffect]);

            // --- STRICT FIREBASE AUTH ---
            useEffect(() => {
                const initAuth = async () => {
                    setAuthLoading(true);
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        }
                    } catch (e) { console.error("Auth failed:", e); }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (!u) {
                        setEntries([]); setTrash([]); setNotebooks(['Main Diary', 'Travel', 'Work', 'Ideas']); setAppPin(null); setIsUnlocked(true);
                    }
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // --- SECURE DATA SYNC & SETTINGS LOAD ---
            useEffect(() => {
                if (!user) return;
                
                const settingsUnsub = onSnapshot(getDocument('settings', 'preferences'), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.appName) setAppName(data.appName);
                        if (data.textSize) setTextSize(data.textSize);
                        if (data.fontFamily) setFontFamily(data.fontFamily);
                        if (data.bgEffect) setBgEffect(data.bgEffect);
                        if (data.privacyMode !== undefined) setPrivacyMode(data.privacyMode);
                        if (data.notebooks) setNotebooks(data.notebooks);
                        if (data.appPin) { setAppPin(data.appPin); setIsUnlocked(false); } 
                        else { setAppPin(null); setIsUnlocked(true); }
                    }
                }, (err) => console.error(err));

                const entriesUnsub = onSnapshot(getColl('entries'), (snap) => {
                    const data = []; snap.forEach(d => pushOrUpdate(data, d.data()));
                    if (snap.empty && data.length === 0) {
                        const initialEntry = { 
                            id: Date.now(), title: 'Welcome to Uday\'s Diary', 
                            content: 'Welcome to **Uday\'s Master Diary Pro**!\n\nYour account is now 100% private and secure. All data on this account is strictly isolated.\n\nEnjoy writing, Uday!', 
                            date: new Date().toISOString(), mood: 'happy', weather: 'sunny', isFavorite: true, isPinned: true, color: 'blue', 
                            location: 'Hyderabad, Telangana', tags: ['welcome'], notebook: 'Main Diary', backgroundImage: null, youtubeUrl: null
                        };
                        setEntries([initialEntry]);
                        setDoc(getDocument('entries', initialEntry.id.toString()), initialEntry).catch(e => console.error(e));
                    } else { setEntries(data); }
                });
                
                const trashUnsub = onSnapshot(getColl('trash'), (snap) => {
                    const data = []; snap.forEach(d => pushOrUpdate(data, d.data())); setTrash(data);
                });

                function pushOrUpdate(arr, item) {
                    const idx = arr.findIndex(i => String(i.id) === String(item.id));
                    if (idx > -1) arr[idx] = item; else arr.push(item);
                }
                
                return () => { entriesUnsub(); trashUnsub(); settingsUnsub(); };
            }, [user, getColl, getDocument]);

            const updateSetting = async (key, value) => {
                if (!user) return;
                try { await setDoc(getDocument('settings', 'preferences'), { [key]: value }, { merge: true }); } 
                catch(e) { showToast("Save Error: Check Firestore Rules"); }
            };

            // Auto-Save Status
            useEffect(() => { currentEntryRef.current = currentEntry; currentRouteRef.current = currentRoute; }, [currentEntry, currentRoute]);
            const saveEntryRef = useRef(null);
            
            const saveEntry = useCallback(async (entry, isSilent = false) => {
                if (!user) return;
                setSyncStatus('saving');
                setEntries(prev => {
                    const updated = prev.map(e => String(e.id) === String(entry.id) ? entry : e);
                    if (!prev.find(e => String(e.id) === String(entry.id))) updated.push(entry);
                    return updated;
                });
                try { 
                    await setDoc(getDocument('entries', entry.id.toString()), entry); 
                    setSyncStatus('saved');
                    if (!isSilent) showToast('Memory saved securely');
                } catch(e) { 
                    setSyncStatus('error');
                    if (!isSilent) showToast('Save Error: Check Firestore Rules');
                }
            }, [user, getDocument, showToast]);

            useEffect(() => { saveEntryRef.current = saveEntry; }, [saveEntry]);

            useEffect(() => {
                const autoSaveInterval = setInterval(() => {
                    if (currentRouteRef.current === 'editor' && currentEntryRef.current && currentEntryRef.current.id) {
                        if (saveEntryRef.current) saveEntryRef.current(currentEntryRef.current, true);
                    }
                }, 15000);
                return () => clearInterval(autoSaveInterval);
            }, [user]);

            // Data Operations
            const deleteEntry = async (entryId) => {
                if (!user) return;
                const deletedItem = entries.find(e => String(e.id) === String(entryId)); 
                if (!deletedItem) {
                    showToast('Draft discarded');
                    return;
                }
                const trashedItem = { ...deletedItem, deletedAt: new Date().toISOString() };
                
                setEntries(prev => prev.filter(e => String(e.id) !== String(entryId)));
                setTrash(prev => [...prev, trashedItem]);

                try { 
                    await setDoc(getDocument('trash', entryId.toString()), trashedItem); 
                    await deleteDoc(getDocument('entries', entryId.toString())); 
                    showToast('Entry moved to trash');
                } catch(e) { console.error(e); showToast('Error moving to trash.'); }
            };
            
            const restoreEntry = async (entryId) => {
                if (!user) return;
                const itemToRestore = trash.find(e => String(e.id) === String(entryId)); 
                if (!itemToRestore) return;
                const { deletedAt, ...entry } = itemToRestore;
                
                setTrash(prev => prev.filter(e => String(e.id) !== String(entryId)));
                setEntries(prev => [...prev, entry]);

                try { 
                    await setDoc(getDocument('entries', entryId.toString()), entry); 
                    await deleteDoc(getDocument('trash', entryId.toString())); 
                    showToast('Entry restored');
                } catch(e) { showToast('Restore failed.'); }
            };
            
            const permanentlyDeleteEntry = async (entryId) => {
                if (!user) return;
                setTrash(prev => prev.filter(t => String(t.id) !== String(entryId)));
                try { await deleteDoc(getDocument('trash', entryId.toString())); showToast('Permanently deleted'); } catch(e) { showToast('Delete failed.'); }
            };
            
            const emptyTrash = async () => {
                if (!user) return;
                const currentTrash = [...trash];
                setTrash([]);
                try { 
                    for (const item of currentTrash) { await deleteDoc(getDocument('trash', item.id.toString())); }
                    showToast('Trash emptied');
                } catch(e) { showToast('Empty trash failed.'); }
            };

            const deleteNotebook = async (nbName) => {
                if (nbName === 'Main Diary') return; 
                const newNbs = notebooks.filter(n => n !== nbName);
                setNotebooks(newNbs);
                updateSetting('notebooks', newNbs);
                const toUpdate = entries.filter(e => e.notebook === nbName);
                for (const entry of toUpdate) {
                    const migrated = {...entry, notebook: 'Main Diary'};
                    await saveEntry(migrated, true);
                }
                if (currentNotebook === nbName) setCurrentNotebook('All');
                showToast(`Deleted notebook: ${nbName}`);
            };

            const clearAllData = async () => {
                if (!user) return;
                const currentEntries = [...entries];
                const currentTrash = [...trash];
                
                setEntries([]); 
                setTrash([]);
                
                try {
                    for (const e of currentEntries) await deleteDoc(getDocument('entries', e.id.toString()));
                    for (const t of currentTrash) await deleteDoc(getDocument('trash', t.id.toString()));
                    showToast("Factory Reset Complete. All data wiped.");
                } catch (e) {
                    showToast("Error wiping data.");
                }
            };

            const exportEntries = () => {
                const json = JSON.stringify(entries, null, 2); const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `diary-backup-${new Date().toISOString().split('T')[0]}.json`; a.click();
                URL.revokeObjectURL(url); showToast('Exported successfully');
            };
            
            const importEntries = () => {
                if (!user) return;
                const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = async (evt) => {
                            try {
                                const imported = JSON.parse(evt.target.result);
                                if (Array.isArray(imported)) {
                                    showToast('Importing to cloud...');
                                    for (const item of imported) {
                                        if (!entries.find(ex => String(ex.id) === String(item.id))) {
                                            await setDoc(getDocument('entries', item.id.toString()), item);
                                        }
                                    }
                                    showToast(`Imported entries to cloud`);
                                }
                            } catch (err) { showToast('Invalid backup file format'); }
                        }; reader.readAsText(file);
                    }
                }; input.click();
            };

            const filteredEntries = entries
                .filter(e => (currentNotebook === 'All' || e.notebook === currentNotebook))
                .filter(e => { const q = searchQuery.toLowerCase(); return (e.title || '').toLowerCase().includes(q) || (e.content || '').toLowerCase().includes(q) || (e.tags && e.tags.some(t => t.toLowerCase().includes(q))); })
                .filter(e => !showFavoritesOnly || e.isFavorite)
                .sort((a, b) => {
                    if (a.isPinned !== b.isPinned) return a.isPinned ? -1 : 1; 
                    if (sortBy === 'newest') return new Date(b.date) - new Date(a.date);
                    if (sortBy === 'oldest') return new Date(a.date) - new Date(b.date);
                    return 0;
                });

            // --- GEMINI API LLM FEATURES ---
            const handleAutoTitle = async () => {
                if (!currentEntry.content) return showToast("Write something first!");
                setIsAILoading(true);
                showToast("AI is thinking of a title...");
                try {
                    const prompt = `Generate a short, catchy, and meaningful title (max 6 words) for the following diary entry. Output ONLY the title text, no quotes or prefixes.\n\nEntry: ${currentEntry.content}`;
                    const title = await callGeminiAPI(prompt);
                    if (title) setCurrentEntry(prev => ({ ...prev, title: title.trim().replace(/^"|"$/g, '') }));
                    showToast("Title generated ✨");
                } catch (e) {
                    showToast("Failed to generate title.");
                } finally { setIsAILoading(false); }
            };

            const handleAutoTags = async () => {
                if (!currentEntry.content) return showToast("Write something first!");
                setIsAILoading(true);
                showToast("AI is analyzing tags...");
                try {
                    const prompt = `Analyze this diary entry and generate 3-5 relevant, single-word tags. Output ONLY a comma-separated list of tags, lowercase, no hash symbols.\n\nEntry: ${currentEntry.content}`;
                    const tagsStr = await callGeminiAPI(prompt);
                    if (tagsStr) {
                        const newTags = tagsStr.split(',').map(t => t.trim().toLowerCase().replace(/[^a-z0-9]/g, '')).filter(t => t);
                        const mergedTags = [...new Set([...(currentEntry.tags || []), ...newTags])];
                        setCurrentEntry(prev => ({ ...prev, tags: mergedTags }));
                    }
                    showToast("Tags added ✨");
                } catch (e) {
                    showToast("Failed to generate tags.");
                } finally { setIsAILoading(false); }
            };

            const handleAIReflection = async () => {
                if (!currentEntry.content) return showToast("Write something first!");
                setIsAILoading(true);
                showToast("AI is reflecting on your entry...");
                try {
                    const sys = "You are a supportive, empathetic journaling coach. Read the diary entry and write a short, meaningful reflection (2-3 sentences) acknowledging the user's feelings and offering a gentle, encouraging thought.";
                    const reflection = await callGeminiAPI(`Entry:\n${currentEntry.content}`, sys);
                    if (reflection) {
                        const newContent = currentEntry.content + `\n\n---\n**✨ AI Coach Reflection:**\n*${reflection.trim()}*`;
                        setCurrentEntry(prev => ({ ...prev, content: newContent }));
                    }
                    showToast("Reflection added ✨");
                } catch (e) {
                    showToast("Failed to generate reflection.");
                } finally { setIsAILoading(false); }
            };

            const handlePolishWriting = async () => {
                if (!currentEntry.content) return showToast("Write something first!");
                setIsAILoading(true);
                showToast("AI is polishing your writing...");
                try {
                    const prompt = `Rewrite the following diary entry to improve grammar, flow, and clarity while strictly maintaining the original tone, emotional weight, and meaning. Output ONLY the rewritten text, preserving markdown formatting if present.\n\nEntry:\n${currentEntry.content}`;
                    const polished = await callGeminiAPI(prompt);
                    if (polished) setCurrentEntry(prev => ({ ...prev, content: polished.trim() }));
                    showToast("Writing polished ✨");
                } catch (e) {
                    showToast("Failed to polish writing.");
                } finally { setIsAILoading(false); }
            };

            const handleGeminiTTS = async () => {
                if (!currentEntry.content && !currentEntry.title) return showToast("Nothing to read.");
                if (isAILoading) return;
                setIsAILoading(true);
                showToast("Generating realistic voice ✨...");
                try {
                    const text = `${currentEntry.title || 'Untitled'}. \n\n ${currentEntry.content || ''}`.substring(0, 1200); 
                    const inlineData = await callGeminiTTS(text);
                    if (inlineData) {
                        const base64Data = inlineData.data;
                        const binaryString = window.atob(base64Data);
                        const len = binaryString.length;
                        const bytes = new Uint8Array(len);
                        for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
                        
                        const mimeMatch = inlineData.mimeType.match(/rate=(\d+)/);
                        const sampleRate = mimeMatch ? parseInt(mimeMatch[1], 10) : 24000;
                        
                        const wavBlob = pcmToWav(bytes.buffer, sampleRate);
                        const audioUrl = URL.createObjectURL(wavBlob);
                        if (audioRef.current) {
                            audioRef.current.pause();
                            URL.revokeObjectURL(audioRef.current.src);
                        }
                        audioRef.current = new Audio(audioUrl);
                        audioRef.current.play();
                        showToast("Playing AI Voice ✨");
                    } else {
                        throw new Error("No data");
                    }
                } catch(e) {
                    console.error(e);
                    showToast("TTS failed. Falling back to native.");
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        window.speechSynthesis.speak(new SpeechSynthesisUtterance(currentEntry.content || currentEntry.title));
                    }
                } finally { setIsAILoading(false); }
            };
            // ------------------------------------

            const insertMarkdown = (prefix, suffix = '') => {
                const textarea = document.getElementById('diary-textarea'); if (!textarea) return;
                const start = textarea.selectionStart; const end = textarea.selectionEnd;
                const text = currentEntry.content || '';
                const newText = text.substring(0, start) + prefix + text.substring(start, end) + suffix + text.substring(end);
                setCurrentEntry(prev => ({ ...prev, content: newText }));
                setTimeout(() => { textarea.focus(); textarea.setSelectionRange(start + prefix.length, end + prefix.length); }, 0);
            };

            const autoDetectMood = () => {
                const text = (currentEntry.content || '').toLowerCase();
                if (/(happy|joy|great|amazing|love|wonderful|fantastic|good|excited|blessed)/.test(text)) { setCurrentEntry(p => ({ ...p, mood: 'happy' })); showToast('Vibe check: Happy 😊'); } 
                else if (/(sad|bad|terrible|awful|crying|depressed|angry|hate|upset)/.test(text)) { setCurrentEntry(p => ({ ...p, mood: 'sad' })); showToast('Vibe check: Sad 😢'); } 
                else { setCurrentEntry(p => ({ ...p, mood: 'neutral' })); showToast('Vibe check: Neutral 😐'); }
            };

            const fetchLocation = () => {
                if (!navigator.geolocation) return showToast('Geolocation not supported');
                showToast('Locating...');
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
                            const data = await res.json();
                            setCurrentEntry(prev => ({ ...prev, location: data.address.city || data.address.state || 'Unknown Location' })); showToast('Location pinned!');
                        } catch (error) { setCurrentEntry(prev => ({ ...prev, location: 'Hyderabad, Telangana' })); showToast('Using default location'); }
                    },
                    () => { setCurrentEntry(prev => ({ ...prev, location: 'Hyderabad, Telangana' })); showToast('Location denied.'); }
                );
            };

            const insertTemplate = (template) => { setCurrentEntry(prev => ({ ...prev, content: (prev.content ? prev.content + '\n\n' : '') + template.content, title: prev.title || template.name })); setShowTemplateModal(false); showToast(`Applied ${template.name}`); };
            const generatePrompt = () => { setCurrentEntry(prev => ({ ...prev, content: `**Prompt:** *${writingPrompts[Math.floor(Math.random() * writingPrompts.length)]}*\n\n` + (prev.content || '') })); showToast('Inspiration added!'); };

            const handleCopyEntry = () => {

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="glass-panel p-10">
                                    <h3 className="text-2xl font-bold mb-8 flex items-center gap-3 text-white"><i className="fas fa-calendar-alt text-blue-400"></i> Activity Map</h3>
                                    <div className="overflow-x-auto hide-scrollbar pb-4">
                                        <div className="grid grid-rows-7 grid-flow-col gap-2 min-w-max">
                                            {[...Array(365)].map((_, i) => {
                                                const date = new Date(); date.setDate(date.getDate() - 364 + i);
                                                const count = entries.filter(e => new Date(e.date).toDateString() === date.toDateString()).length;
                                                let bg = 'bg-white/5 border border-white/5';
                                                if (count === 1) bg = 'bg-blue-500/40 border border-blue-400/50 shadow-[0_0_10px_rgba(59,130,246,0.3)]';
                                                if (count === 2) bg = 'bg-blue-500/70 border border-blue-400/80 shadow-[0_0_15px_rgba(59,130,246,0.5)]';
                                                if (count >= 3) bg = 'bg-blue-400 border border-blue-300 shadow-[0_0_20px_rgba(59,130,246,0.8)] scale-110 z-10 relative';
                                                return <div key={i} className={`w-4 h-4 rounded-sm ${bg} transition-all duration-300 hover:scale-[2] hover:z-20 cursor-crosshair`} title={`${date.toLocaleDateString()}: ${count} entries`}></div>;
                                            })}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="glass-panel p-10">
                                    <h3 className="text-2xl font-bold mb-8 flex items-center gap-3 text-white"><i className="fas fa-face-smile-beam text-pink-400"></i> Mood Analytics</h3>
                                    {(() => {
                                        const h = entries.filter(e => e.mood === 'happy').length;
                                        const n = entries.filter(e => e.mood === 'neutral').length;
                                        const s = entries.filter(e => e.mood === 'sad').length;
                                        const t = Math.max(1, h + n + s); // avoid div 0
                                        return (
                                            <div>
                                                <div className="w-full h-8 flex rounded-full overflow-hidden mb-6 border border-white/10">
                                                    <div className="bg-gradient-to-r from-green-400 to-green-500 h-full transition-all duration-1000" style={{width: `${(h/t)*100}%`}}></div>
                                                    <div className="bg-gradient-to-r from-gray-400 to-gray-500 h-full transition-all duration-1000" style={{width: `${(n/t)*100}%`}}></div>
                                                    <div className="bg-gradient-to-r from-red-400 to-red-500 h-full transition-all duration-1000" style={{width: `${(s/t)*100}%`}}></div>
                                                </div>
                                                <div className="flex justify-between items-center bg-black/30 p-4 rounded-2xl border border-white/5">
                                                    <div className="text-center"><span className="text-2xl mb-1 block">😊</span><p className="text-sm font-bold text-green-400">{Math.round((h/t)*100)}%</p></div>
                                                    <div className="text-center"><span className="text-2xl mb-1 block">😐</span><p className="text-sm font-bold text-gray-400">{Math.round((n/t)*100)}%</p></div>
                                                    <div className="text-center"><span className="text-2xl mb-1 block">😢</span><p className="text-sm font-bold text-red-400">{Math.round((s/t)*100)}%</p></div>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- TRASH --- */}
                    {currentRoute === 'trash' && (
                        <div className="max-w-5xl mx-auto px-4 py-10 pb-20 font-modern">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-6">
                                <div className="flex items-center gap-6">
                                    <button onClick={() => setCurrentRoute('dashboard')} className="w-12 h-12 rounded-full glass-button flex items-center justify-center text-xl"><i className="fas fa-arrow-left"></i></button>
                                    <div>
                                        <h2 className="text-4xl font-black tracking-tight text-white">Trash Bin</h2>
                                        <p className="text-gray-400 font-medium mt-1">{trash.length} items waiting for permanent deletion.</p>
                                    </div>
                                </div>
                                {trash.length > 0 && <button onClick={() => setDeleteModal({ isOpen: true, payload: null, type: 'empty-trash' })} className="px-6 py-3 bg-red-500 hover:bg-red-600 rounded-xl text-white font-bold shadow-lg shadow-red-500/30 transition-transform hover:-translate-y-1 flex items-center gap-2"><i className="fas fa-fire"></i> Empty Bin</button>}
                            </div>
                            
                            {trash.length === 0 ? (
                                <div className="text-center py-24 glass-panel">
                                    <div className="w-24 h-24 rounded-full bg-white/5 border border-white/10 flex items-center justify-center mx-auto mb-6"><i className="fas fa-trash-can text-4xl text-gray-500"></i></div>
                                    <h3 className="text-2xl font-bold text-white">It's clean here</h3>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {trash.map(entry => (
                                        <div key={entry.id} className="glass-panel p-6 flex flex-col sm:flex-row justify-between sm:items-center gap-6 group hover:bg-white/5 transition-colors">
                                            <div>
                                                <h3 className="font-bold text-xl mb-2 text-white">{entry.title || 'Untitled'}</h3>
                                                <p className="text-sm text-red-400 font-bold bg-red-500/10 inline-block px-3 py-1 rounded-lg"><i className="far fa-clock mr-1"></i> Deleted: {new Date(entry.deletedAt).toLocaleDateString()}</p>
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => restoreEntry(entry.id)} className="px-5 py-2.5 bg-green-500/20 hover:bg-green-500/30 border border-green-500/30 text-green-400 rounded-xl font-bold transition-colors shadow-inner"><i className="fas fa-rotate-left mr-2"></i> Restore</button>
                                                <button onClick={() => permanentlyDeleteEntry(entry.id)} className="px-5 py-2.5 bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 text-red-400 rounded-xl font-bold transition-colors shadow-inner"><i className="fas fa-trash-can mr-2"></i> Delete</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* --- SETTINGS --- */}
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay flex justify-end z-[9000] font-modern">
                            <div className="bg-black/60 backdrop-blur-3xl border-l border-white/10 p-8 w-full max-w-md h-full shadow-[-20px_0_50px_rgba(0,0,0,0.5)] overflow-y-auto hide-scrollbar">
                                <div className="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                                    <h2 className="text-3xl font-black text-white tracking-tight">Settings</h2>
                                    <button onClick={() => setShowSettings(false)} className="w-12 h-12 glass-button rounded-full flex items-center justify-center text-white"><i className="fas fa-times text-xl"></i></button>
                                </div>
                                
                                <div className="space-y-8">
                                    <div className="glass-panel p-6 rounded-3xl">
                                        <h3 className="text-xs font-black text-cyan-400 mb-5 uppercase tracking-[0.2em]">Account Status</h3>
                                        <div>
                                            <div className="flex items-center gap-4 mb-5">
                                                <div className="w-12 h-12 rounded-full bg-cyan-500/20 text-cyan-400 flex items-center justify-center text-xl"><i className="fas fa-user"></i></div>
                                                <div>
                                                    <p className="font-bold text-white text-lg">{user.displayName || 'Uday Kumar'}</p>
                                                    <p className="text-sm text-gray-400">{user.email || 'Cloud Linked Account'}</p>
                                                </div>
                                            </div>
                                            <button onClick={async () => { try { await signOut(auth); setShowSettings(false); } catch (e) { showToast("Failed to sign out."); } }} className="w-full py-3 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-xl font-bold transition-colors shadow-inner flex items-center justify-center gap-2">
                                                <i className="fas fa-right-from-bracket"></i> Sign Out Securely
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="glass-panel p-6 rounded-3xl">
                                        <h3 className="text-xs font-black text-blue-400 mb-5 uppercase tracking-[0.2em]">Privacy Vault</h3>
                                        <p className="text-sm text-gray-300 mb-5 font-medium">Require a 4-digit PIN to open the diary.</p>
                                        {appPin ? (
                                            <button onClick={() => { updateSetting('appPin', null); setAppPin(null); showToast('PIN Removed'); }} className="w-full py-3 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-xl font-bold transition-colors">Disable PIN Lock</button>
                                        ) : (
                                            <button onClick={() => { setPromptModal({ isOpen: true, title: 'Set 4-Digit PIN', placeholder: 'e.g. 1234', onConfirm: (p) => { if(p && /^\d{4}$/.test(p)) { updateSetting('appPin', p); setAppPin(p); showToast('Vault Locked'); } else showToast('Must be exactly 4 digits'); setPromptModal({isOpen: false}); }, onCancel: () => setPromptModal({isOpen: false}) }); }} className="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-500/30 transition-transform hover:-translate-y-1">Enable PIN Lock</button>
                                        )}
                                    </div>
                                    
                                    <div className="glass-panel p-6 rounded-3xl">
                                        <h3 className="text-xs font-black text-purple-400 mb-5 uppercase tracking-[0.2em]">Appearance</h3>
                                        <label className="block text-sm text-white font-bold mb-3">Background Effect</label>
                                        <select value={bgEffect} onChange={(e) => { setBgEffect(e.target.value); updateSetting('bgEffect', e.target.value); }} className="w-full px-5 py-4 mb-6 glass-input rounded-xl text-white font-bold cursor-pointer">
                                            <option value="birds" className="bg-gray-900">Origami Birds</option>
                                            <option value="net" className="bg-gray-900">Cyber Net</option>
                                            <option value="waves" className="bg-gray-900">Ocean Waves</option>
                                            <option value="none" className="bg-gray-900">Deep Dark (None)</option>
                                        </select>

                                        <label className="block text-sm text-white font-bold mb-3">Typography Style</label>
                                        <div className="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-white/5 mb-6">
                                            {[{id:'modern', l:'Modern'}, {id:'academic', l:'Serif'}, {id:'typewriter', l:'Mono'}].map(f => (
                                                <button key={f.id} onClick={() => { setFontFamily(f.id); updateSetting('fontFamily', f.id); }} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${fontFamily === f.id ? 'bg-white/20 text-white shadow-md' : 'text-gray-400 hover:text-white'} font-${f.id}`}>{f.l}</button>
                                            ))}
                                        </div>

                                        <label className="block text-sm text-white font-bold mb-3">Diary Name</label>
                                        <input type="text" value={appName} onChange={(e) => { setAppName(e.target.value); updateSetting('appName', e.target.value); }} className="w-full px-5 py-4 mb-6 glass-input rounded-xl text-white font-bold" />
                                        
                                        <label className="block text-sm text-white font-bold mb-3">Reader Text Size</label>
                                        <div className="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-white/5 mb-6">
                                            {['small', 'normal', 'large'].map(s => (
                                                <button key={s} onClick={() => { setTextSize(s); updateSetting('textSize', s); }} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all capitalize ${textSize === s ? 'bg-white/20 text-white shadow-md' : 'text-gray-400 hover:text-white'}`}>{s}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="glass-panel p-6 rounded-3xl">
                                        <h3 className="text-xs font-black text-green-400 mb-5 uppercase tracking-[0.2em]">Notebooks</h3>
                                        <div className="flex flex-col gap-2 mb-5">
                                            {notebooks.map(nb => (
                                                <div key={nb} className="flex justify-between items-center px-4 py-2 bg-white/5 rounded-xl border border-white/5 hover:bg-white/10 transition-colors">
                                                    <span className="font-bold text-white text-sm">{nb}</span>
                                                    {nb !== 'Main Diary' && (
                                                        <button onClick={() => deleteNotebook(nb)} className="w-8 h-8 rounded-full flex items-center justify-center text-red-400 hover:bg-red-500/20 hover:text-red-300 transition-colors"><i className="fas fa-trash text-xs"></i></button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { 
                                            setPromptModal({ 
                                                isOpen: true, title: 'New Notebook Name', placeholder: 'e.g. Dreams',
                                                onConfirm: (n) => { 
                                                    if(n && !notebooks.includes(n)) { const newNbs = [...notebooks, n]; setNotebooks(newNbs); updateSetting('notebooks', newNbs); showToast('Notebook added'); } 
                                                    setPromptModal({isOpen: false});
                                                }, onCancel: () => setPromptModal({isOpen: false}) 
                                            }); 
                                        }} className="w-full py-3 glass-button rounded-xl text-white font-bold transition-colors"><i className="fas fa-plus mr-2"></i> Add Notebook</button>
                                    </div>
                                    
                                    <div className="glass-panel p-6 rounded-3xl">
                                        <h3 className="text-xs font-black text-orange-400 mb-5 uppercase tracking-[0.2em]">Data Management</h3>
                                        <div className="grid grid-cols-2 gap-3 mb-6">
                                            <button onClick={() => { exportEntries(); setShowSettings(false); }} className="py-4 glass-button rounded-xl text-white font-bold transition-colors flex flex-col items-center gap-2"><i className="fas fa-cloud-arrow-down text-2xl"></i> Export JSON</button>
                                            <button onClick={() => { importEntries(); setShowSettings(false); }} className="py-4 glass-button rounded-xl text-white font-bold transition-colors flex flex-col items-center gap-2"><i className="fas fa-cloud-arrow-up text-2xl"></i> Import JSON</button>
                                        </div>
                                        <div className="border-t border-red-500/30 pt-6 mt-4">
                                            <button onClick={() => setDeleteModal({ isOpen: true, payload: null, type: 'clear-all' })} className="w-full py-4 bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500 hover:text-white transition-all rounded-xl font-black uppercase tracking-wider shadow-[0_0_15px_rgba(239,68,68,0.2)] flex items-center justify-center gap-2">
                                                <i className="fas fa-skull-crossbones"></i> Wipe All Data
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Modals */}
                    {showTemplateModal && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9000] p-4 font-modern">
                            <div className="glass-panel p-8 max-w-md w-full shadow-2xl text-white relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-indigo-500"></div>
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-bold"><i className="fas fa-layer-group text-indigo-400 mr-3"></i> Templates</h2>
                                    <button onClick={() => setShowTemplateModal(false)} className="w-10 h-10 glass-button rounded-full"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="space-y-3">
                                    {diaryTemplates.map(t => <button key={t.name} onClick={() => insertTemplate(t)} className="w-full text-left p-5 glass-button rounded-xl font-bold text-lg hover:border-indigo-500/50 hover:bg-indigo-500/10">{t.name}</button>)}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <PromptModal isOpen={promptModal.isOpen} title={promptModal.title} placeholder={promptModal.placeholder} onConfirm={promptModal.onConfirm} onCancel={promptModal.onCancel} />
                    
                    <Modal 
                        isOpen={deleteModal.isOpen} 
                        title="Confirm Action" 
                        message={
                            deleteModal.type === 'empty-trash' ? 'Are you sure you want to permanently delete all items in the trash? This cannot be undone.' : 
                            deleteModal.type === 'clear-all' ? 'DANGER: You are about to permanently wipe ALL notebooks, entries, and trash. This cannot be undone.' :
                            'Are you sure you want to move this entry to the trash?'
                        } 
                        onConfirm={() => { 
                            if (deleteModal.type === 'empty-trash') emptyTrash(); 
                            else if (deleteModal.type === 'clear-all') clearAllData();
                            else { deleteEntry(deleteModal.payload); setCurrentEntry(null); setCurrentRoute('dashboard'); } 
                            setDeleteModal({ isOpen: false, payload: null, type: '' }); 
                        }} 
                        onCancel={() => setDeleteModal({ isOpen: false, payload: null, type: '' })} 
                        confirmText={deleteModal.type === 'empty-trash' ? "Empty Trash" : deleteModal.type === 'clear-all' ? "Wipe Data" : "Move to Trash"} 
                        isDangerous 
                    />
                    
                    {toastMessage && <Toast message={toastMessage} />}
                    {showZenMode && <ZenMode onClose={() => setShowZenMode(false)} />}
                    {showDrawing && <DrawingCanvas onSave={url => { setCurrentEntry({...currentEntry, images: [...(currentEntry.images||[]), url]}); showToast('Doodle saved to entry'); }} onClose={() => setShowDrawing(false)} />}
                    {showVoiceRecorder && <VoiceRecorder onSave={data => { setCurrentEntry({...currentEntry, audioMemo: data}); showToast('Audio memo saved to entry'); }} onClose={() => setShowVoiceRecorder(false)} showToast={showToast} />}
                </div>
            );
        };
        
        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>

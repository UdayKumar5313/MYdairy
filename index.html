<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        // ============ LOCAL STORAGE HELPERS ============
        const storage = {
            get: (key, defaultValue = null) => {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.warn('Storage error:', e);
                    return defaultValue;
                }
            },
            set: (key, value) => {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch (e) {
                    if (e.name === 'QuotaExceededError') {
                        alert('❌ Storage quota exceeded (5MB limit). Please delete some entries.');
                    }
                    return false;
                }
            }
        };
        
        // ============ TOAST NOTIFICATION ============
        const Toast = ({ message, duration = 3000 }) => {
            const [visible, setVisible] = useState(true);
            
            useEffect(() => {
                const timer = setTimeout(() => setVisible(false), duration);
                return () => clearTimeout(timer);
            }, [duration]);
            
            if (!visible) return null;
            
            return (
                <div className="toast-enter fixed bottom-4 right-4 bg-white/20 dark:bg-black/40 backdrop-blur-xl border border-white/30 dark:border-white/10 text-slate-900 dark:text-white px-6 py-3 rounded-xl shadow-2xl z-50">
                    {message}
                </div>
            );
        };
        
        // ============ CUSTOM MODAL ============
        const Modal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = 'Confirm', cancelText = 'Cancel', isDangerous = false }) => {
            if (!isOpen) return null;
            
            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
                    <div className="bg-white/20 dark:bg-black/40 backdrop-blur-2xl border border-white/30 dark:border-white/10 rounded-2xl shadow-2xl p-6 max-w-md w-full mx-4 transform transition-all text-slate-900 dark:text-white">
                        <h2 className="text-xl font-bold mb-2">{title}</h2>
                        <p className="opacity-80 mb-6">{message}</p>
                        <div className="flex gap-3 justify-end">
                            <button
                                onClick={onCancel}
                                className="px-4 py-2 rounded-xl bg-white/30 dark:bg-black/50 hover:bg-white/40 dark:hover:bg-black/60 border border-white/30 dark:border-white/10 transition-colors font-medium backdrop-blur-md"
                            >
                                {cancelText}
                            </button>
                            <button
                                onClick={onConfirm}
                                className={`px-4 py-2 rounded-xl text-white font-semibold shadow-md transition-transform hover:-translate-y-0.5 ${isDangerous ? 'bg-gradient-to-r from-red-500/80 to-red-600/80 backdrop-blur-md border border-white/20' : 'bg-gradient-to-r from-blue-500/80 to-indigo-600/80 backdrop-blur-md border border-white/20'}`}
                            >
                                {confirmText}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };
        
        
        // ============ DRAWING CANVAS ============
        const DrawingCanvas = ({ onSave, onClose }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight - 80;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }, []);
            
            const getCoordinates = (e) => {
                if (e.touches && e.touches.length > 0) {
                    return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
                }
                return { clientX: e.nativeEvent.clientX, clientY: e.nativeEvent.clientY };
            };
            
            const startDrawing = (e) => {
                setIsDrawing(true);
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();
                const { clientX, clientY } = getCoordinates(e);
                ctx.beginPath();
                ctx.moveTo(clientX - rect.left, clientY - rect.top);
            };
            
            const draw = (e) => {
                if (!isDrawing) return;
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();
                const { clientX, clientY } = getCoordinates(e);
                ctx.lineTo(clientX - rect.left, clientY - rect.top);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();
            };
            
            const stopDrawing = () => {
                setIsDrawing(false);
            };
            
            const handleSave = () => {
                const dataUrl = canvasRef.current.toDataURL('image/png');
                onSave(dataUrl);
                onClose();
            };
            
            const handleClear = () => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
            };
            
            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-xl z-50 flex flex-col p-4 sm:p-8">
                    <div className="flex justify-between items-center p-4 bg-white/20 dark:bg-black/40 backdrop-blur-2xl border border-white/30 dark:border-white/10 rounded-t-2xl text-slate-900 dark:text-white shadow-xl">
                        <h2 className="text-xl font-bold">Draw Something</h2>
                        <div className="flex gap-3">
                            <button onClick={handleClear} className="px-4 py-2 bg-white/30 dark:bg-black/50 border border-white/30 dark:border-white/10 rounded-lg hover:bg-white/40 dark:hover:bg-black/60 font-medium backdrop-blur-md">
                                <i className="fas fa-trash"></i> Clear
                            </button>
                            <button onClick={handleSave} className="px-4 py-2 bg-blue-500/80 hover:bg-blue-600/90 border border-blue-400/50 backdrop-blur-md rounded-lg font-medium text-white transition-colors">
                                <i className="fas fa-save"></i> Save
                            </button>
                            <button onClick={onClose} className="px-4 py-2 bg-red-500/80 hover:bg-red-600/90 border border-red-400/50 backdrop-blur-md rounded-lg font-medium text-white transition-colors">
                                <i className="fas fa-times"></i> Close
                            </button>
                        </div>
                    </div>
                    <canvas
                        ref={canvasRef}
                        onMouseDown={startDrawing}
                        onMouseMove={draw}
                        onMouseUp={stopDrawing}
                        onMouseLeave={stopDrawing}
                        onTouchStart={startDrawing}
                        onTouchMove={draw}
                        onTouchEnd={stopDrawing}
                        className="cursor-crosshair flex-1 touch-none bg-white/20 dark:bg-black/40 backdrop-blur-2xl rounded-b-2xl shadow-xl"
                    ></canvas>
                </div>
            );
        };
        
        // ============ ZEN MODE ============
        const ZenMode = ({ onClose }) => {
            const [breathingText, setBreathingText] = useState('Breathe In');
            
            useEffect(() => {
                const texts = ['Breathe In', 'Hold', 'Hold', 'Breathe Out'];
                let index = 0;
                
                const timer = setInterval(() => {
                    index = (index + 1) % texts.length;
                    setBreathingText(texts[index]);
                }, 2000);
                
                return () => clearInterval(timer);
            }, []);
            
            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-2xl flex items-center justify-center z-50 text-white">
                    <div className="text-center">
                        <div className="breathing-circle bg-white/20 backdrop-blur-md border border-white/30 mb-8"></div>
                        <h2 className="text-4xl font-bold mb-4 drop-shadow-lg">{breathingText}</h2>
                        <button
                            onClick={onClose}
                            className="mt-16 px-6 py-3 bg-white/30 border border-white/30 text-white rounded-lg font-semibold hover:bg-white/40 backdrop-blur-md transition-all shadow-lg"
                        >
                            Close
                        </button>
                    </div>
                </div>
            );
        };
        
        // ============ VOICE RECORDER ============
        const VoiceRecorder = ({ onSave, onClose }) => {
            const [recording, setRecording] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const mediaRecorderRef = useRef(null);
            const streamRef = useRef(null);
            const chunksRef = useRef([]);
            
            const startRecording = async () => {
                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        alert('Microphone access is not supported in this environment (Requires HTTPS).');
                        return;
                    }
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    chunksRef.current = [];
                    
                    mediaRecorder.ondataavailable = (e) => {
                        chunksRef.current.push(e.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        setAudioUrl(url);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                    setRecording(true);
                } catch (err) {
                    alert('Microphone access denied');
                }
            };
            
            const stopRecording = () => {
                if (mediaRecorderRef.current) {
                    mediaRecorderRef.current.stop();
                    setRecording(false);
                }
            };
            
            const handleSave = async () => {
                if (audioUrl) {
                    const response = await fetch(audioUrl);
                    const blob = await response.blob();
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        onSave(e.target.result);
                        onClose();
                    };
                    reader.readAsDataURL(blob);
                }
            };
            
            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
                    <div className="bg-white/20 dark:bg-black/40 backdrop-blur-2xl border border-white/30 dark:border-white/10 rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 text-slate-900 dark:text-white">
                        <h2 className="text-2xl font-bold mb-6 text-center">Record Voice Memo</h2>
                        
                        <div className="flex justify-center mb-6">
                            <div className={`w-24 h-24 rounded-full flex items-center justify-center shadow-inner ${recording ? 'bg-red-500 animate-pulse shadow-red-500/50 text-white' : 'bg-white/30 dark:bg-black/50 border border-white/30 dark:border-white/10 backdrop-blur-md'}`}>
                                <i className={`fas fa-microphone text-3xl ${recording ? 'text-white' : 'text-gray-600'}`}></i>
                            </div>
                        </div>
                        
                        {audioUrl && (
                            <audio controls src={audioUrl} className="w-full mb-6"></audio>
                        )}
                        
                        <div className="flex gap-3">
                            {!recording ? (
                                <button
                                    onClick={startRecording}
                                    className="flex-1 py-3 bg-gradient-to-r from-red-500/80 to-red-600/80 backdrop-blur-md border border-white/20 text-white rounded-xl font-semibold shadow-md hover:shadow-lg transition-all"
                                >
                                    <i className="fas fa-circle"></i> Start Recording
                                </button>
                            ) : (
                                <button
                                    onClick={stopRecording}
                                    className="flex-1 py-3 bg-white/30 dark:bg-black/50 border border-white/30 dark:border-white/10 backdrop-blur-md rounded-xl font-semibold hover:bg-white/40 dark:hover:bg-black/60 shadow-md transition-all text-slate-900 dark:text-white"
                                >
                                    <i className="fas fa-stop"></i> Stop
                                </button>
                            )}
                            <button
                                onClick={onClose}
                                    className="flex-1 py-3 bg-white/30 dark:bg-black/50 border border-white/30 dark:border-white/10 backdrop-blur-md rounded-xl font-semibold hover:bg-white/40 dark:hover:bg-black/60 transition-all text-slate-900 dark:text-white"
                            >
                                Cancel
                            </button>
                            {audioUrl && (
                                <button
                                    onClick={handleSave}
                                    className="flex-1 py-3 bg-gradient-to-r from-green-500/80 to-emerald-600/80 backdrop-blur-md border border-white/20 text-white rounded-xl font-semibold shadow-md hover:shadow-lg transition-all"
                                >
                                    Save
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        
        // ============ YOUTUBE HELPER ============
        const getYouTubeEmbedUrl = (url) => {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null;
        };

        // ============ MAIN DIARY APP ============
        const DiaryApp = () => {
            const [cloudStatus, setCloudStatus] = useState('checking'); // 'checking', 'needs_login', 'connected', 'offline'
            const [user, setUser] = useState(null);
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isSignUp, setIsSignUp] = useState(false);
            const [authLoading, setAuthLoading] = useState(false);

            const [currentRoute, setCurrentRoute] = useState('dashboard');
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString());
            const [entries, setEntries] = useState(storage.get('diaryEntries', [{ id: 1, title: 'Welcome', content: 'Welcome to Uday\'s Master Diary Pro! This app features: mood tracking, voice memos, doodles, location tagging, markdown support, dark mode, and more.', date: new Date().toISOString(), mood: 'happy', weather: 'sunny', isFavorite: false, color: 'blue', location: 'Hyderabad, Telangana, India', tags: [], images: [], audioMemo: null, backgroundImage: null, youtubeUrl: null }]));
            const [currentEntry, setCurrentEntry] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [sortBy, setSortBy] = useState('newest');
            const [showFavoritesOnly, setShowFavoritesOnly] = useState(false);
            const [viewMode, setViewMode] = useState('timeline');
            const darkMode = true;
            const [showDrawing, setShowDrawing] = useState(false);
            const [showVoiceRecorder, setShowVoiceRecorder] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            const [deleteModal, setDeleteModal] = useState({ isOpen: false, entryId: null });
            const [showSettings, setShowSettings] = useState(false);
            const [appName, setAppName] = useState(storage.get('appName', 'Master Diary'));
            const [trash, setTrash] = useState(storage.get('diaryTrash', []));
            const [textSize, setTextSize] = useState(storage.get('textSize', 'normal'));
            const [showZenMode, setShowZenMode] = useState(false);
            const [dayStreak, setDayStreak] = useState(storage.get('dayStreak', 0));
            const [focusMode, setFocusMode] = useState(false);
            const [privacyMode, setPrivacyMode] = useState(storage.get('privacyMode', false));
            const [activeTagFilter, setActiveTagFilter] = useState(null);
            const [showScrollTop, setShowScrollTop] = useState(false);
            
            const vantaRef = useRef(null);
            const currentEntryRef = useRef(currentEntry);
            const currentRouteRef = useRef(currentRoute);
            
            useEffect(() => {
                let vantaEffect;
                if (window.VANTA && vantaRef.current) {
                    vantaEffect = window.VANTA.BIRDS({
                        el: vantaRef.current,
                        mouseControls: true,
                        touchControls: true,
                        gyroControls: false,
                        minHeight: 200.00,
                        minWidth: 200.00,
                        scale: 1.00,
                        scaleMobile: 1.00,
                        backgroundColor: 0x0f172a,
                        backgroundAlpha: 1,
                        color1: 0x3b82f6,
                        color2: 0x8b5cf6,
                        colorMode: 'varianceGradient',
                        quantity: 5,
                        birdSize: 2.50,
                        wingSpan: 35.00,
                        speedLimit: 5,
                        separation: 100.00,
                        alignment: 38.00,
                        cohesion: 100.00
                    });
                }
                return () => {
                    if (vantaEffect) vantaEffect.destroy();
                };
            }, []);
            
            // ============ FIREBASE AUTH & FIRESTORE SYNC ============
            useEffect(() => {
                let attempts = 0;
                const checkFirebase = () => {
                    if (window.firebaseUtils) {
                        const { auth, onAuthStateChanged } = window.firebaseUtils;
                        onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            setCloudStatus(u ? 'connected' : 'needs_login');
                        });
                    } else {
                        attempts++;
                        if (attempts > 20) {
                            console.warn('Firebase initialization timeout. Running offline.');
                            setCloudStatus('offline');
                        } else {
                            setTimeout(checkFirebase, 100);
                        }
                    }
                };
                checkFirebase();
            }, []);

            useEffect(() => {
                if (cloudStatus !== 'connected' || !user || !window.firebaseUtils) return;
                const { db, collection, onSnapshot } = window.firebaseUtils;
                
                const entriesUnsub = onSnapshot(collection(db, `users/${user.uid}/entries`), (snap) => {
                    const data = [];
                    snap.forEach(d => data.push(d.data()));
                    setEntries(data);
                    storage.set('diaryEntries', data);
                });

                const trashUnsub = onSnapshot(collection(db, `users/${user.uid}/trash`), (snap) => {
                    const data = [];
                    snap.forEach(d => data.push(d.data()));
                    setTrash(data);
                    storage.set('diaryTrash', data);
                });

                return () => { entriesUnsub(); trashUnsub(); };
            }, [user, cloudStatus]);

            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => setToastMessage(''), 3000);
            };
            
            useEffect(() => {
                document.documentElement.classList.add('dark');
            }, []);
            
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date().toLocaleTimeString());
                }, 1000);
                return () => clearInterval(timer);
            }, []);
            
            // Keep refs updated for setInterval Auto-save
            useEffect(() => { currentEntryRef.current = currentEntry; }, [currentEntry]);
            useEffect(() => { currentRouteRef.current = currentRoute; }, [currentRoute]);
            const saveEntryRef = useRef(null);

            // ============ SCROLL TO TOP & AUTO-SAVE ============
            useEffect(() => {
                const handleScroll = () => setShowScrollTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                
                const autoSaveInterval = setInterval(() => {
                    if (currentRouteRef.current === 'editor' && currentEntryRef.current && currentEntryRef.current.id && saveEntryRef.current) {
                        saveEntryRef.current(currentEntryRef.current, true);
                    }
                }, 15000); // Autosave every 15s
                
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    clearInterval(autoSaveInterval);
                };
            }, []);
            
            const handleEmailAuth = async (e) => {
                e.preventDefault();
                if (!email || !password || (isSignUp && !name)) return showToast("Required fields missing");
                
                setAuthLoading(true);
                try {
                    const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } = window.firebaseUtils;
                    if (isSignUp) {
                        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(userCredential.user, { displayName: name });
                        const newAppName = `${name}'s Diary`;
                        setAppName(newAppName);
                        storage.set('appName', newAppName);
                        showToast("Account created successfully!");
                    } else {
                        const userCredential = await signInWithEmailAndPassword(auth, email, password);
                        if (userCredential.user.displayName) {
                            const newAppName = `${userCredential.user.displayName}'s Diary`;
                            setAppName(newAppName);
                            storage.set('appName', newAppName);
                        }
                        showToast("Signed in successfully!");
                    }
                } catch(err) {
                    showToast(err.message.replace('Firebase: ', ''));
                } finally {
                    setAuthLoading(false);
                }
            };
            
            const saveEntry = async (entry, isSilent = false) => {
                setEntries(prev => {
                    const updated = prev.map(e => e.id === entry.id ? entry : e);
                    if (!prev.find(e => e.id === entry.id)) updated.push(entry);
                    storage.set('diaryEntries', updated);
                    return updated;
                });
                if (cloudStatus === 'connected' && user && window.firebaseUtils) {
                    try {
                        const { db, doc, setDoc } = window.firebaseUtils;
                        await setDoc(doc(db, `users/${user.uid}/entries`, entry.id.toString()), entry);
                    } catch(e) { console.error("Cloud save failed", e); }
                }
                if (!isSilent) showToast('Entry saved');
            };
            
            useEffect(() => { saveEntryRef.current = saveEntry; }, [saveEntry]);
            
            const deleteEntry = async (entryId) => {
                const deletedItem = entries.find(e => e.id === entryId);
                if (!deletedItem) return;
                
                setEntries(prev => {
                    const updated = prev.filter(e => e.id !== entryId);
                    storage.set('diaryEntries', updated);
                    return updated;
                });
                
                const trashedItem = { ...deletedItem, deletedAt: new Date().toISOString() };
                setTrash(prev => {
                    const updated = [...prev, trashedItem];
                    storage.set('diaryTrash', updated);
                    return updated;
                });
                
                if (cloudStatus === 'connected' && user && window.firebaseUtils) {
                    try {
                        const { db, doc, setDoc, deleteDoc } = window.firebaseUtils;
                        await setDoc(doc(db, `users/${user.uid}/trash`, entryId.toString()), trashedItem);
                        await deleteDoc(doc(db, `users/${user.uid}/entries`, entryId.toString()));
                    } catch(e) { console.error(e); }
                }
                showToast('Entry moved to trash');
            };
            
            const restoreEntry = async (entryId) => {
                const itemToRestore = trash.find(e => e.id === entryId);
                if (!itemToRestore) return;
                
                setTrash(prev => {
                    const updated = prev.filter(e => e.id !== entryId);
                    storage.set('diaryTrash', updated);
                    return updated;
                });
                
                const { deletedAt, ...entry } = itemToRestore;
                setEntries(prev => {
                    const updated = [...prev, entry];
                    storage.set('diaryEntries', updated);
                    return updated;
                });
                
                if (cloudStatus === 'connected' && user && window.firebaseUtils) {
                    try {
                        const { db, doc, setDoc, deleteDoc } = window.firebaseUtils;
                        await setDoc(doc(db, `users/${user.uid}/entries`, entryId.toString()), entry);
                        await deleteDoc(doc(db, `users/${user.uid}/trash`, entryId.toString()));
                    } catch(e) { console.error(e); }
                }
                showToast('Entry restored');
            };
            
            const permanentlyDeleteEntry = async (entryId) => {
                setTrash(prev => {
                    const updated = prev.filter(e => e.id !== entryId);
                    storage.set('diaryTrash', updated);
                    return updated;
                });
                if (cloudStatus === 'connected' && user && window.firebaseUtils) {
                    try {
                        const { db, doc, deleteDoc } = window.firebaseUtils;
                        await deleteDoc(doc(db, `users/${user.uid}/trash`, entryId.toString()));
                    } catch(e) { console.error(e); }
                }
                showToast('Entry permanently deleted');
            };
            
            const emptyTrash = async () => {
                const currentTrash = [...trash];
                setTrash([]);
                storage.set('diaryTrash', []);
                if (cloudStatus === 'connected' && user && window.firebaseUtils) {
                    try {
                        const { db, doc, deleteDoc } = window.firebaseUtils;
                        for (const item of currentTrash) {
                            await deleteDoc(doc(db, `users/${user.uid}/trash`, item.id.toString()));
                        }
                    } catch(e) { console.error(e); }
                }
                showToast('Trash emptied');
            };
            
            const duplicateEntry = (entryId) => {
                const entryToDuplicate = entries.find(e => e.id === entryId);
                if (entryToDuplicate) {
                    saveEntry({ ...entryToDuplicate, id: Date.now(), date: new Date().toISOString() });
                }
            };
            
            const exportEntries = () => {
                const json = JSON.stringify(entries, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `diary-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('Diary exported successfully');
            };
            
            const importEntries = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (evt) => {
                            try {
                                const imported = JSON.parse(evt.target.result);
                                if (Array.isArray(imported)) {
                                    const merged = [...entries, ...imported.filter(e => !entries.find(ex => ex.id === e.id))];
                                    setEntries(merged);
                                    storage.set('diaryEntries', merged);
                                    showToast(`Imported ${imported.length} entries`);
                                }
                            } catch (err) {
                                alert('Invalid backup file format');
                            }
                        };
                        reader.readAsText(file);
                    }
                };
                input.click();
            };
            
            const filteredAndSortedEntries = entries
                .filter(e => {
                    const query = (searchQuery || '').toLowerCase();
                    return (e.title || '').toLowerCase().includes(query) || 
                           (e.content || '').toLowerCase().includes(query) || 
                           (e.tags && e.tags.some(t => (t || '').toLowerCase().includes(query)));
                })
                .filter(e => !showFavoritesOnly || e.isFavorite)
                .filter(e => !activeTagFilter || (e.tags && e.tags.includes(activeTagFilter)))
                .sort((a, b) => {
                    switch(sortBy) {
                        case 'oldest': return new Date(a.date) - new Date(b.date);
                        case 'longest': return (b.content || '').length - (a.content || '').length;
                        case 'shortest': return (a.content || '').length - (b.content || '').length;
                        default: return new Date(b.date) - new Date(a.date);
                    }
                });
                
            // Pre-calculations for Insights & Views
            const allTags = [...new Set(entries.flatMap(e => e.tags || []))];
            const wordsToday = entries.filter(e => new Date(e.date).toDateString() === new Date().toDateString())
                .reduce((sum, e) => sum + (e.content ? e.content.trim().split(/\s+/).filter(w => w.length > 0).length : 0), 0);
            const dailyGoal = 500;
            const wordGoalProgress = Math.min(100, (wordsToday / dailyGoal) * 100);
            
            return (
                <div className="dark">
                    <div ref={vantaRef} className="fixed inset-0 z-0"></div>

                        </div>

                    {cloudStatus === 'needs_login' && (

                            <div className="bg-white/20 dark:bg-black/40 backdrop-blur-2xl border border-white/30 dark:border-white/10 rounded-3xl shadow-2xl p-8 max-w-md w-full text-slate-900 dark:text-white">
                                <div className="flex justify-center mb-6"><i className="fas fa-cloud text-5xl text-blue-500"></i></div>
                                <h2 className="text-3xl font-bold mb-2 text-center">Master Diary Pro</h2>
                                <p className="opacity-75 mb-8 text-center text-sm">{isSignUp ? "Create an account to sync your memories." : "Sign in to access your synced memories."}</p>

                                    <input type="email" placeholder="Email Address" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition bg-white/30 dark:bg-black/50 border border-white/30 dark:border-white/10 text-slate-900 dark:text-white placeholder-slate-600 dark:placeholder-gray-400 backdrop-blur-md shadow-inner" required />
                                    <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition bg-white/30 dark:bg-black/50 border border-white/30 dark:border-white/10 text-slate-900 dark:text-white placeholder-slate-600 dark:placeholder-gray-400 backdrop-blur-md shadow-inner" required minLength="6" />

                                        {authLoading ? <i className="fas fa-spinner fa-spin"></i> : (isSignUp ? "Sign Up" : "Sign In")}

                                    Use Offline Mode (No Cloud Sync)
                                </button>
                            </div>
                        </div>
                    )}

                    {(cloudStatus === 'connected' || cloudStatus === 'offline') && (

                                    <div className="flex items-center gap-3">
                                        <i className="fas fa-book text-2xl text-blue-600"></i>

                                    </div>
                                    <div className="flex items-center gap-3 sm:gap-4 text-sm font-bold bg-black/5 dark:bg-white/10 px-4 py-2 rounded-full backdrop-blur-sm shadow-inner">
                                        <div className={`hidden sm:block ${darkMode ? 'text-yellow-400' : 'text-orange-500'}`}>
                                            <i className="fas fa-fire"></i> {dayStreak}-Day Streak
                                        </div>
                                        <div className={darkMode ? 'text-blue-300' : 'text-blue-600'}>
                                            <span id="clock">{currentTime}</span>
                                        </div>
                                        {cloudStatus === 'connected' ? (
                                            <div className="text-green-500 dark:text-green-400 ml-2" title="Cloud Sync Active">
                                                <i className="fas fa-cloud"></i>
                                            </div>
                                        ) : (
                                            <div className="text-gray-500 ml-2" title="Offline Mode"><i className="fas fa-cloud-slash"></i></div>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="flex items-center justify-between flex-wrap gap-4">
                                    <div className="flex-1 min-w-[280px] max-w-md relative">
                                        <i className="fas fa-search absolute left-4 top-3.5 text-gray-500"></i>
                                        <input
                                            type="text"
                                            placeholder="Search entries..."
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="w-full pl-10 pr-5 py-2.5 rounded-xl bg-white/30 dark:bg-black/50 border border-white/30 dark:border-white/10 text-slate-900 dark:text-white placeholder-slate-600 dark:placeholder-gray-400 backdrop-blur-md shadow-inner focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        />
                                    </div>
                                    
                                    <div className="flex gap-2">
                                        <button
                                            onClick={() => setShowZenMode(true)}

                                            title="Zen Mode"
                                        >
                                            <i className="fas fa-spa"></i>
                                        </button>
                                        <button
                                            onClick={() => {
                                                setPrivacyMode(!privacyMode);
                                                storage.set('privacyMode', !privacyMode);
                                            }}
                                            className={`px-3 py-2 ${privacyMode ? 'bg-red-500/80 text-white border-red-400/50' : 'bg-white/30 dark:bg-black/50 border-white/30 dark:border-white/10 text-slate-900 dark:text-white'} hover:bg-white/40 dark:hover:bg-black/60 rounded-xl shadow-sm transition-colors text-sm font-medium backdrop-blur-md`}
                                            title="Privacy Mode (Blur)"
                                        >
                                            <i className={`fas fa-${privacyMode ? 'eye-slash' : 'eye'}`}></i>
                                        </button>
                                        <button
                                            onClick={() => setShowSettings(true)}
                                            className="px-3 py-2 bg-white/30 dark:bg-black/50 hover:bg-white/40 dark:hover:bg-black/60 border border-white/30 dark:border-white/10 rounded-xl shadow-sm transition-colors text-sm font-medium text-slate-900 dark:text-white backdrop-blur-md"
                                            title="Settings"
                                        >
                                            <i className="fas fa-cog"></i>
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="flex items-center justify-between mt-4 flex-wrap gap-3">
                                    <div className="flex gap-2">
                                        <select
                                            value={sortBy}
                                            onChange={(e) => setSortBy(e.target.value)}
                                            className="px-3 py-2 rounded-xl text-sm font-medium bg-white/30 dark:bg-black/50 border border-white/30 dark:border-white/10 text-slate-900 dark:text-white backdrop-blur-md outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
                                        >
                                            <option value="newest">Newest</option>
                                            <option value="oldest">Oldest</option>
                                            <option value="longest">Longest First</option>
                                            <option value="shortest">Shortest First</option>

                                        <button

                                            className={`px-3 py-2 rounded-xl text-sm font-semibold transition-colors shadow-sm backdrop-blur-md border ${showFavoritesOnly ? 'bg-yellow-500/80 text-white border-yellow-400/50 shadow-yellow-500/30' : 'bg-white/30 dark:bg-black/50 border-white/30 dark:border-white/10 text-slate-900 dark:text-white hover:bg-white/40 dark:hover:bg-black/60'}`}
                                        >
                                            <i className="fas fa-star"></i> Favorites

                                        <button

                                            className="px-3 py-2 rounded-xl text-sm transition-colors shadow-sm bg-white/30 dark:bg-black/50 border border-white/30 dark:border-white/10 text-slate-900 dark:text-white hover:bg-white/40 dark:hover:bg-black/60 backdrop-blur-md"
                                        >

                                    <div className="flex gap-2 flex-wrap">
                                        <button

                                                const random = entries[Math.floor(Math.random() * entries.length)];
                                                setCurrentEntry(random);
                                                setCurrentRoute('reader');
                                            }}
                                            className="px-3 py-2 bg-gradient-to-r from-orange-400 to-red-500 text-white rounded-xl shadow-md hover:shadow-lg transition-transform hover:-translate-y-0.5 text-sm font-medium"
                                            title="Memory Roulette"

                                        >

                                        <button

                                                setCurrentRoute('editor');

                                {/* DAILY GOAL PROGRESS */}

                                                #{tag}
                                            </button>

                        <div className="bg-white/10 dark:bg-black/20 backdrop-blur-xl border-b border-white/30 dark:border-white/10 px-4 py-2 text-xs font-medium tracking-wide text-slate-800 dark:text-gray-200">

                            </div>
                        </div>

                    {/* "ON THIS DAY" FLASHBACKS */}
                    {currentRoute === 'dashboard' && (

                                    const eDate = new Date(e.date);
                                    return eDate.getMonth() === today.getMonth() && eDate.getDate() === today.getDate() && eDate.getFullYear() !== today.getFullYear();

                                if (onThisDay.length > 0) {

                    {/* ENTRIES DISPLAY */}

                                            <button onClick={() => { exportEntries(); setShowSettings(false); }} className="flex-1 py-2.5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl transition-colors text-sm font-bold flex items-center justify-center gap-2"><i className="fas fa-download"></i> Export</button>
                                            <button onClick={() => { importEntries(); setShowSettings(false); }} className="flex-1 py-2.5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl transition-colors text-sm font-bold flex items-center justify-center gap-2"><i className="fas fa-upload"></i> Import</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                        </>
                    )}
                    </div>
                </div>
            );
        };
        
        // ============ RENDER APP ============
        ReactDOM.createRoot(document.getElementById('root')).render(<DiaryApp />);
    </script>
</body>

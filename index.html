        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1; 
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true); view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data'); view.setUint32(40, dataSize, true);

            const pcmArray = new Uint8Array(pcmData);
            new Uint8Array(buffer, 44).set(pcmArray);

            return new Blob([buffer], { type: 'audio/wav' });

            function writeString(view, offset, string) {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            }

                ctx.beginPath(); ctx.moveTo(clientX - rect.left, clientY - rect.top);
            };

                if (!isDrawing) return;
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();

                ctx.lineTo(clientX - rect.left, clientY - rect.top);

        const VoiceRecorder = ({ onSave, onClose, showToast }) => {
            const [recording, setRecording] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const mediaRecorderRef = useRef(null);
            const streamRef = useRef(null);
            const chunksRef = useRef([]);
            
            const startRecording = async () => {
                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showToast('Microphone access is not supported here.'); return; }
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    chunksRef.current = [];
                    mediaRecorder.ondataavailable = (e) => chunksRef.current.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                        setAudioUrl(URL.createObjectURL(blob));
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start(); setRecording(true);
                } catch (err) { showToast('Microphone access denied.'); }
            };
            const stopRecording = () => { if (mediaRecorderRef.current) { mediaRecorderRef.current.stop(); setRecording(false); } };
            const handleSave = async () => {
                if (audioUrl) {
                    const response = await fetch(audioUrl); const blob = await response.blob();

            const match = url.match(regExp);

        // --- MAIN APP COMPONENT ---

            // Dynamic Background Engine
            useEffect(() => {

            // --- STRICT FIREBASE AUTH ---

                const entriesUnsub = onSnapshot(getColl('entries'), (snap) => {

                return () => { entriesUnsub(); trashUnsub(); settingsUnsub(); };

            const updateSetting = async (key, value) => {

            // Data Operations

                    if (sortBy === 'oldest') return new Date(a.date) - new Date(b.date);

            // --- GEMINI API LLM FEATURES ---
            const handleAutoTitle = async () => {

                try {
                    const prompt = `Generate a short, catchy, and meaningful title (max 6 words) for the following diary entry. Output ONLY the title text, no quotes or prefixes.\n\nEntry: ${currentEntry.content}`;
                    const title = await callGeminiAPI(prompt);
                    if (title) setCurrentEntry(prev => ({ ...prev, title: title.trim().replace(/^"|"$/g, '') }));

                    showToast("Failed to generate title.");

            const handleAutoTags = async () => {
                if (!currentEntry.content) return showToast("Write something first!");

                try {

                    if (tagsStr) {
                        const newTags = tagsStr.split(',').map(t => t.trim().toLowerCase().replace(/[^a-z0-9]/g, '')).filter(t => t);

                    const reflection = await callGeminiAPI(`Entry:\n${currentEntry.content}`, sys);
                    if (reflection) {

            const handleGeminiTTS = async () => {
                if (!currentEntry.content && !currentEntry.title) return showToast("Nothing to read.");
                if (isAILoading) return;
                setIsAILoading(true);
                showToast("Generating realistic voice ✨...");
                try {
                    const text = `${currentEntry.title || 'Untitled'}. \n\n ${currentEntry.content || ''}`.substring(0, 1200); 
                    const inlineData = await callGeminiTTS(text);
                    if (inlineData) {
                        const base64Data = inlineData.data;
                        const binaryString = window.atob(base64Data);
                        const len = binaryString.length;
                        const bytes = new Uint8Array(len);
                        for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
                        
                        const mimeMatch = inlineData.mimeType.match(/rate=(\d+)/);
                        const sampleRate = mimeMatch ? parseInt(mimeMatch[1], 10) : 24000;
                        
                        const wavBlob = pcmToWav(bytes.buffer, sampleRate);
                        const audioUrl = URL.createObjectURL(wavBlob);
                        if (audioRef.current) {
                            audioRef.current.pause();
                            URL.revokeObjectURL(audioRef.current.src);
                        }
                        audioRef.current = new Audio(audioUrl);
                        audioRef.current.play();
                        showToast("Playing AI Voice ✨");
                    } else {
                        throw new Error("No data");
                    }

                    console.error(e);

                    if ('speechSynthesis' in window) {

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <div className="glass-panel p-6 md:p-10 overflow-hidden w-full shadow-2xl">
                                    <h3 className="text-xl md:text-2xl font-black mb-8 flex items-center gap-3 text-white tracking-tight"><div className="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center border border-blue-500/30 text-blue-400"><i className="fas fa-calendar-alt"></i></div> Activity Map</h3>
                                    <div className="overflow-x-auto hide-scrollbar pb-4 w-full">
                                        <div className="grid grid-rows-7 grid-flow-col gap-1.5 md:gap-2 min-w-max bg-black/40 p-4 rounded-3xl border border-white/5 shadow-inner">
                                            {[...Array(365)].map((_, i) => {
                                                const date = new Date(); date.setDate(date.getDate() - 364 + i);
                                                const count = entries.filter(e => new Date(e.date).toDateString() === date.toDateString()).length;
                                                let bg = 'bg-white/5 border border-white/5';
                                                if (count === 1) bg = 'bg-blue-500/40 border border-blue-400/50 shadow-[0_0_8px_rgba(59,130,246,0.4)]';
                                                if (count === 2) bg = 'bg-blue-500/70 border border-blue-400/80 shadow-[0_0_12px_rgba(59,130,246,0.6)]';
                                                if (count >= 3) bg = 'bg-blue-400 border border-blue-300 shadow-[0_0_20px_rgba(59,130,246,0.9)] z-10 relative';
                                                return <div key={i} className={`w-3.5 h-3.5 md:w-4 md:h-4 rounded-sm ${bg} transition-all duration-300 hover:scale-[2] hover:z-20 cursor-crosshair`} title={`${date.toLocaleDateString()}: ${count} entries`}></div>;
                                            })}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="glass-panel p-6 md:p-10 shadow-2xl flex flex-col">
                                    <h3 className="text-xl md:text-2xl font-black mb-8 flex items-center gap-3 text-white tracking-tight"><div className="w-10 h-10 rounded-full bg-pink-500/20 flex items-center justify-center border border-pink-500/30 text-pink-400"><i className="fas fa-face-smile-beam"></i></div> Mood Analytics</h3>
                                    {(() => {
                                        const h = entries.filter(e => e.mood === 'happy').length;
                                        const n = entries.filter(e => e.mood === 'neutral').length;
                                        const s = entries.filter(e => e.mood === 'sad').length;
                                        const t = Math.max(1, h + n + s); 
                                        return (
                                            <div className="flex-grow flex flex-col justify-center">
                                                <div className="w-full h-8 sm:h-10 flex rounded-full overflow-hidden mb-8 border border-white/10 shadow-inner bg-black/40">
                                                    <div className="bg-gradient-to-r from-green-400 to-emerald-500 h-full transition-all duration-1000 shadow-[inset_0_2px_4px_rgba(255,255,255,0.3)]" style={{width: `${(h/t)*100}%`}}></div>
                                                    <div className="bg-gradient-to-r from-gray-400 to-gray-500 h-full transition-all duration-1000 shadow-[inset_0_2px_4px_rgba(255,255,255,0.3)]" style={{width: `${(n/t)*100}%`}}></div>
                                                    <div className="bg-gradient-to-r from-red-400 to-rose-500 h-full transition-all duration-1000 shadow-[inset_0_2px_4px_rgba(255,255,255,0.3)]" style={{width: `${(s/t)*100}%`}}></div>
                                                </div>
                                                <div className="flex justify-between items-center bg-black/40 p-5 rounded-3xl border border-white/10 shadow-inner">
                                                    <div className="text-center flex-1"><span className="text-3xl md:text-4xl mb-2 block drop-shadow-md">😊</span><p className="text-xs md:text-sm font-black text-green-400 uppercase tracking-widest">{Math.round((h/t)*100)}%</p></div>
                                                    <div className="w-[1px] h-12 bg-white/10"></div>
                                                    <div className="text-center flex-1"><span className="text-3xl md:text-4xl mb-2 block drop-shadow-md">😐</span><p className="text-xs md:text-sm font-black text-gray-400 uppercase tracking-widest">{Math.round((n/t)*100)}%</p></div>
                                                    <div className="w-[1px] h-12 bg-white/10"></div>
                                                    <div className="text-center flex-1"><span className="text-3xl md:text-4xl mb-2 block drop-shadow-md">😢</span><p className="text-xs md:text-sm font-black text-red-400 uppercase tracking-widest">{Math.round((s/t)*100)}%</p></div>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- TRASH --- */}
                    {currentRoute === 'trash' && (
                        <div className="max-w-5xl mx-auto px-4 py-10 pb-32 font-modern w-full relative z-10 animate-fadeIn">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-6">
                                <div className="flex items-center gap-5">
                                    <button onClick={() => setCurrentRoute('dashboard')} className="w-14 h-14 rounded-full glass-button flex items-center justify-center text-xl shrink-0 hover:bg-white/10 transition-colors"><i className="fas fa-arrow-left"></i></button>
                                    <div>
                                        <h2 className="text-3xl md:text-4xl font-black tracking-tight text-white drop-shadow-md">Recycle Bin</h2>
                                        <p className="text-gray-400 font-medium mt-1">{trash.length} items waiting for permanent deletion.</p>
                                    </div>
                                </div>
                                {trash.length > 0 && <button onClick={() => setDeleteModal({ isOpen: true, payload: null, type: 'empty-trash' })} className="w-full sm:w-auto px-6 py-3.5 bg-red-500 hover:bg-red-600 rounded-xl text-white font-bold shadow-[0_10px_20px_rgba(239,68,68,0.3)] border border-red-400/30 transition-transform hover:-translate-y-1 flex items-center justify-center gap-2"><i className="fas fa-fire"></i> Empty Bin</button>}
                            </div>
                            
                            {trash.length === 0 ? (
                                <div className="text-center py-24 glass-panel mx-1 sm:mx-0 shadow-xl border-dashed border-2 border-white/20 rounded-[3rem]">
                                    <div className="w-24 h-24 rounded-full bg-white/5 border border-white/10 flex items-center justify-center mx-auto mb-6 shadow-inner"><i className="fas fa-trash-can text-4xl text-gray-500"></i></div>
                                    <h3 className="text-2xl font-black text-white">It's completely clean here</h3>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {trash.map((entry, index) => (
                                        <div key={entry.id} style={{animationDelay: `${index * 50}ms`}} className="animate-fadeIn glass-panel p-6 flex flex-col md:flex-row justify-between md:items-center gap-4 group hover:bg-white/5 transition-colors shadow-lg">
                                            <div className="min-w-0">
                                                <h3 className="font-bold text-xl mb-2 text-white truncate tracking-tight">{entry.title || 'Untitled'}</h3>
                                                <p className="text-xs text-red-400 font-bold bg-red-500/10 border border-red-500/20 inline-block px-3 py-1.5 rounded-lg"><i className="far fa-clock mr-1.5"></i> Deleted: {new Date(entry.deletedAt).toLocaleDateString()}</p>
                                            </div>
                                            <div className="flex gap-3 w-full md:w-auto">
                                                <button onClick={() => restoreEntry(entry.id)} className="flex-1 md:flex-none px-6 py-3 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 rounded-xl font-bold transition-colors text-sm flex items-center justify-center"><i className="fas fa-rotate-left mr-2"></i> Restore</button>
                                                <button onClick={() => permanentlyDeleteEntry(entry.id)} className="flex-1 md:flex-none px-6 py-3 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-xl font-bold transition-colors text-sm flex items-center justify-center"><i className="fas fa-trash-can mr-2"></i> Delete Forever</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* --- SETTINGS MODAL --- */}
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay flex justify-end z-[9000] font-modern">
                            <div className="bg-[#050505]/80 backdrop-blur-3xl border-l border-white/10 p-6 md:p-10 w-full max-w-md h-full shadow-[-30px_0_60px_rgba(0,0,0,0.6)] overflow-y-auto hide-scrollbar pb-[env(safe-area-inset-bottom)] animate-fadeIn relative">
                                
                                <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-blue-500 via-purple-500 to-pink-500"></div>

                                <div className="flex justify-between items-center mb-10 border-b border-white/10 pb-6 mt-4">
                                    <h2 className="text-3xl font-black text-white tracking-tight">Settings</h2>
                                    <button onClick={() => setShowSettings(false)} className="w-12 h-12 glass-button rounded-full flex items-center justify-center text-white shrink-0 hover:bg-white/10 hover:rotate-90 transition-all"><i className="fas fa-times text-xl"></i></button>
                                </div>
                                
                                <div className="space-y-8 pb-12">
                                    <div className="glass-panel p-6 rounded-[2rem] shadow-xl border-t border-white/20">
                                        <h3 className="text-xs font-black text-cyan-400 mb-6 uppercase tracking-[0.2em] flex items-center gap-2"><i className="fas fa-id-badge"></i> Account Status</h3>
                                        <div>
                                            <div className="flex items-center gap-4 mb-6 bg-black/40 p-4 rounded-2xl border border-white/5 shadow-inner">
                                                <div className="w-14 h-14 rounded-full bg-cyan-500/20 border border-cyan-500/30 text-cyan-400 flex items-center justify-center text-xl shrink-0"><i className="fas fa-user"></i></div>
                                                <div className="overflow-hidden min-w-0">
                                                    <p className="font-bold text-white text-lg truncate">{user.displayName || 'Uday Kumar'}</p>
                                                    <p className="text-sm text-gray-400 truncate">{user.email || 'Cloud Linked Account'}</p>
                                                </div>
                                            </div>
                                            <button onClick={async () => { try { await signOut(auth); setShowSettings(false); } catch (e) { showToast("Failed to sign out."); } }} className="w-full py-3.5 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-xl font-bold transition-colors shadow-inner flex items-center justify-center gap-2 text-sm">
                                                <i className="fas fa-right-from-bracket"></i> Sign Out Securely
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="glass-panel p-6 rounded-[2rem] shadow-xl border-t border-white/20">
                                        <h3 className="text-xs font-black text-blue-400 mb-6 uppercase tracking-[0.2em] flex items-center gap-2"><i className="fas fa-lock"></i> Privacy Vault</h3>
                                        <p className="text-sm text-gray-300 mb-6 font-medium">Require a secure 4-digit PIN to open the diary application.</p>
                                        {appPin ? (
                                            <button onClick={() => { updateSetting('appPin', null); setAppPin(null); showToast('PIN Removed'); }} className="w-full py-3.5 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-xl font-bold transition-colors text-sm">Disable PIN Lock</button>
                                        ) : (
                                            <button onClick={() => { setPromptModal({ isOpen: true, title: 'Set 4-Digit PIN', placeholder: 'e.g. 1234', onConfirm: (p) => { if(p && /^\d{4}$/.test(p)) { updateSetting('appPin', p); setAppPin(p); showToast('Vault Locked'); } else showToast('Must be exactly 4 digits'); setPromptModal({isOpen: false}); }, onCancel: () => setPromptModal({isOpen: false}) }); }} className="w-full py-3.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold shadow-[0_10px_20px_rgba(59,130,246,0.3)] transition-transform hover:-translate-y-1 text-sm border border-blue-400/30">Enable PIN Lock</button>
                                        )}
                                    </div>
                                    
                                    <div className="glass-panel p-6 rounded-[2rem] shadow-xl border-t border-white/20">
                                        <h3 className="text-xs font-black text-purple-400 mb-6 uppercase tracking-[0.2em] flex items-center gap-2"><i className="fas fa-paintbrush"></i> Appearance</h3>
                                        
                                        <label className="block text-sm text-white font-bold mb-3">Background Effect</label>
                                        <select value={bgEffect} onChange={(e) => { setBgEffect(e.target.value); updateSetting('bgEffect', e.target.value); }} className="w-full px-4 py-3.5 mb-6 bg-black/40 border border-white/10 rounded-xl text-white font-bold cursor-pointer text-sm shadow-inner outline-none focus:border-purple-500">
                                            <option value="birds" className="bg-gray-900">Origami Birds</option>
                                            <option value="net" className="bg-gray-900">Cyber Net</option>
                                            <option value="waves" className="bg-gray-900">Ocean Waves</option>
                                            <option value="none" className="bg-gray-900">Deep Dark (None)</option>
                                        </select>

                                        <label className="block text-sm text-white font-bold mb-3">Typography Style</label>
                                        <div className="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-white/10 mb-6 shadow-inner">
                                            {[{id:'modern', l:'Modern'}, {id:'academic', l:'Serif'}, {id:'typewriter', l:'Mono'}].map(f => (
                                                <button key={f.id} onClick={() => { setFontFamily(f.id); updateSetting('fontFamily', f.id); }} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${fontFamily === f.id ? 'bg-white/15 text-white shadow-md border border-white/10' : 'text-gray-400 hover:text-white hover:bg-white/5'} font-${f.id}`}>{f.l}</button>
                                            ))}
                                        </div>

                                        <label className="block text-sm text-white font-bold mb-3">Diary Name</label>
                                        <input type="text" value={appName} onChange={(e) => { setAppName(e.target.value); updateSetting('appName', e.target.value); }} className="w-full px-4 py-3.5 mb-6 bg-black/40 border border-white/10 rounded-xl text-white font-bold text-sm shadow-inner outline-none focus:border-purple-500 transition-colors" />
                                        
                                        <label className="block text-sm text-white font-bold mb-3">Reader Text Size</label>
                                        <div className="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-white/10 shadow-inner">
                                            {['small', 'normal', 'large'].map(s => (
                                                <button key={s} onClick={() => { setTextSize(s); updateSetting('textSize', s); }} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all capitalize ${textSize === s ? 'bg-white/15 text-white shadow-md border border-white/10' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>{s}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="glass-panel p-6 rounded-[2rem] shadow-xl border-t border-white/20">
                                        <h3 className="text-xs font-black text-emerald-400 mb-6 uppercase tracking-[0.2em] flex items-center gap-2"><i className="fas fa-book"></i> Notebooks</h3>
                                        <div className="flex flex-col gap-3 mb-6">
                                            {notebooks.map(nb => (
                                                <div key={nb} className="flex justify-between items-center px-4 py-3 bg-black/40 rounded-xl border border-white/10 shadow-inner group">
                                                    <span className="font-bold text-white text-sm truncate mr-2"><i className="fas fa-hashtag text-gray-500 mr-2"></i>{nb}</span>
                                                    {nb !== 'Main Diary' && (
                                                        <button onClick={() => deleteNotebook(nb)} className="w-8 h-8 rounded-full flex items-center justify-center text-gray-500 hover:bg-red-500/20 hover:text-red-400 transition-colors shrink-0 opacity-0 group-hover:opacity-100"><i className="fas fa-trash text-xs"></i></button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => { 
                                            setPromptModal({ 
                                                isOpen: true, title: 'New Notebook Name', placeholder: 'e.g. Dreams',
                                                onConfirm: (n) => { 
                                                    if(n && !notebooks.includes(n)) { const newNbs = [...notebooks, n]; setNotebooks(newNbs); updateSetting('notebooks', newNbs); showToast('Notebook added'); } 
                                                    setPromptModal({isOpen: false});
                                                }, onCancel: () => setPromptModal({isOpen: false}) 
                                            }); 
                                        }} className="w-full py-3 glass-button rounded-xl text-white font-bold transition-colors text-sm"><i className="fas fa-plus mr-2 text-emerald-400"></i> Add Notebook</button>
                                    </div>
                                    
                                    <div className="glass-panel p-6 rounded-[2rem] shadow-xl border-t border-white/20">
                                        <h3 className="text-xs font-black text-orange-400 mb-6 uppercase tracking-[0.2em] flex items-center gap-2"><i className="fas fa-database"></i> Data Management</h3>
                                        <div className="grid grid-cols-2 gap-3 mb-6">
                                            <button onClick={() => { exportEntries(); setShowSettings(false); }} className="py-4 bg-black/40 hover:bg-white/10 border border-white/10 rounded-2xl text-white font-bold transition-colors flex flex-col items-center gap-2 text-sm shadow-inner"><i className="fas fa-cloud-arrow-down text-2xl text-blue-400"></i> Export JSON</button>
                                            <button onClick={() => { importEntries(); setShowSettings(false); }} className="py-4 bg-black/40 hover:bg-white/10 border border-white/10 rounded-2xl text-white font-bold transition-colors flex flex-col items-center gap-2 text-sm shadow-inner"><i className="fas fa-cloud-arrow-up text-2xl text-emerald-400"></i> Import JSON</button>
                                        </div>
                                        <div className="border-t border-red-500/20 pt-6 mt-2">
                                            <button onClick={() => setDeleteModal({ isOpen: true, payload: null, type: 'clear-all' })} className="w-full py-4 bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500 hover:text-white transition-all rounded-xl font-black uppercase tracking-widest shadow-inner flex items-center justify-center gap-2 text-sm">
                                                <i className="fas fa-skull-crossbones"></i> Factory Reset
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Modals Container */}
                    {showTemplateModal && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9000] p-4 font-modern animate-fadeIn">
                            <div className="glass-panel p-8 max-w-md w-full shadow-2xl text-white relative overflow-hidden max-h-[90vh] overflow-y-auto hide-scrollbar border-t border-white/20">
                                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black tracking-tight"><i className="fas fa-layer-group text-indigo-400 mr-3"></i> Templates</h2>
                                    <button onClick={() => setShowTemplateModal(false)} className="w-10 h-10 glass-button rounded-full shrink-0 hover:bg-white/10 transition-colors"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="space-y-3">
                                    {diaryTemplates.map(t => <button key={t.name} onClick={() => insertTemplate(t)} className="w-full text-left p-5 bg-black/40 hover:bg-indigo-500/20 border border-white/10 hover:border-indigo-500/40 rounded-2xl font-bold text-base transition-all shadow-inner truncate">{t.name}</button>)}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <PromptModal isOpen={promptModal.isOpen} title={promptModal.title} placeholder={promptModal.placeholder} onConfirm={promptModal.onConfirm} onCancel={promptModal.onCancel} />
                    
                    <Modal 
                        isOpen={deleteModal.isOpen} 
                        title="Confirm Action" 
                        message={
                            deleteModal.type === 'empty-trash' ? 'Are you sure you want to permanently delete all items in the trash? This cannot be undone.' : 
                            deleteModal.type === 'clear-all' ? 'DANGER: You are about to permanently wipe ALL notebooks, entries, and trash. This cannot be undone.' :
                            'Are you sure you want to move this entry to the trash?'
                        } 
                        onConfirm={() => { 
                            if (deleteModal.type === 'empty-trash') emptyTrash(); 
                            else if (deleteModal.type === 'clear-all') clearAllData();
                            else { deleteEntry(deleteModal.payload); setCurrentEntry(null); setCurrentRoute('dashboard'); } 
                            setDeleteModal({ isOpen: false, payload: null, type: '' }); 
                        }} 
                        onCancel={() => setDeleteModal({ isOpen: false, payload: null, type: '' })} 
                        confirmText={deleteModal.type === 'empty-trash' ? "Empty Trash" : deleteModal.type === 'clear-all' ? "Wipe Data" : "Move to Trash"} 
                        isDangerous 
                    />
                    
                    {toastMessage && <Toast message={toastMessage} />}
                    {showZenMode && <ZenMode onClose={() => setShowZenMode(false)} />}
                    {showDrawing && <DrawingCanvas onSave={url => { setCurrentEntry({...currentEntry, images: [...(currentEntry.images||[]), url]}); showToast('Doodle saved to entry'); }} onClose={() => setShowDrawing(false)} />}
                    {showVoiceRecorder && <VoiceRecorder onSave={data => { setCurrentEntry({...currentEntry, audioMemo: data}); showToast('Audio memo saved to entry'); }} onClose={() => setShowVoiceRecorder(false)} showToast={showToast} />}
                </div>
            );
        };
        
        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>

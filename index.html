<head>

        tailwind.config = { darkMode: 'class' };

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Global CDNs (Lightning Fast) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        /* =========================================
           HIGH-PERFORMANCE PURE GLASS THEME
        ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #050505; 
            color: #f1f5f9; 
            overflow-x: hidden;
        }

        /* Core Glassmorphism Classes (Optimized) */
        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
        }
        
        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease-out;
        }
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.2s ease;
        }
        .glass-input:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            outline: none;
        }

        .glass-nav {
            background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Interactive Elements */
        .card-hover-effect { transition: transform 0.2s ease, box-shadow 0.2s ease; border-left-width: 4px; border-left-style: solid; }
        .card-hover-effect:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* Markdown Styles */
        .markdown-body h1 { font-size: 2.5rem; font-weight: 800; margin: 2rem 0 1rem; color: #fff; }
        .markdown-body h2 { font-size: 1.8rem; font-weight: 700; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .markdown-body h3 { font-size: 1.4rem; font-weight: 700; margin: 1.25rem 0 0.5rem; }
        .markdown-body p { margin-bottom: 1.25rem; line-height: 1.8; color: rgba(255,255,255,0.9); }
        .markdown-body ul, .markdown-body ol { margin-left: 1.5rem; margin-bottom: 1.25rem; }
        .markdown-body li { margin-bottom: 0.5rem; line-height: 1.6; color: rgba(255,255,255,0.9); }
        .markdown-body blockquote { border-left: 4px solid #3b82f6; background: rgba(59, 130, 246, 0.1); padding: 1rem 1.5rem; border-radius: 0 1rem 1rem 0; margin-bottom: 1.25rem; font-style: italic; }
        .markdown-body a { color: #60a5fa; text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body strong { color: #fff; font-weight: 700; }
        .markdown-body pre { background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 1rem; overflow-x: auto; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Modals & Animations */
        .modal-overlay { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); }
        .toast-enter { animation: slideInUp 0.3s ease-out forwards; }
        @keyframes slideInUp { from { transform: translate(-50%, 50px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .privacy-blur { filter: blur(8px); transition: filter 0.3s ease; user-select: none; }
        .privacy-blur:hover { filter: blur(0); }

        .timeline-dot { position: absolute; left: -25px; top: 1.5rem; width: 14px; height: 14px; border-radius: 50%; background: #3b82f6; border: 3px solid #050505; z-index: 10; box-shadow: 0 0 15px rgba(59,130,246,0.8); }
        .timeline-line { position: absolute; left: -19px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, rgba(59, 130, 246, 0.5), transparent); z-index: 0; }

        .card-color-red { border-left-color: #ef4444; }
        .card-color-blue { border-left-color: #3b82f6; }
        .card-color-green { border-left-color: #10b981; }
        .card-color-purple { border-left-color: #a855f7; }
        .card-color-yellow { border-left-color: #f59e0b; }
        .card-color-pink { border-left-color: #ec4899; }

        @media print {
            .no-print, .vanta-canvas { display: none !important; }
            body { background: white; color: black; }
            .glass-panel { background: white; box-shadow: none; border: 1px solid #ccc; filter: none; backdrop-filter: none; }
            .markdown-body * { color: black !important; }
        }
    </style>
</head>
<body>
    <!-- HTML Fallback Loader -->
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #050505; color: #fff; font-family: sans-serif;">
            <svg style="width: 50px; height: 50px; animation: spin 1s linear infinite; color: #3b82f6;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle style="opacity: 0.25;" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path style="opacity: 0.75;" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <h2 style="margin-top: 20px; font-size: 1.2rem; font-weight: bold; letter-spacing: 1px;">Loading Master Diary Pro...</h2>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
        </div>
    </div>
    
    <!-- ES Modules loaded dynamically inside Babel -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { marked } from 'https://esm.sh/marked@10.0.0';
        import DOMPurify from 'https://esm.sh/dompurify@3.0.6';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- Error Boundary (Failsafe) ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return <div className="p-10 text-white bg-red-900 min-h-screen flex flex-col items-center justify-center">
                        <i className="fas fa-triangle-exclamation text-6xl mb-4"></i>
                        <h1 className="text-2xl font-bold mb-4">Something went wrong</h1>
                        <pre className="bg-black/50 p-4 rounded-xl text-sm max-w-2xl overflow-auto">{this.state.error.toString()}</pre>
                    </div>;
                }
                return this.props.children;
            }
        }

        // --- Config & Fast Storage Setup ---
        let isCanvasEnv = typeof __firebase_config !== 'undefined';
        let firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCURQx_sKChUpkWCEgX4nAcr81402LDdNw", authDomain: "mydairy-4fb6b.firebaseapp.com",
            databaseURL: "https://mydairy-4fb6b-default-rtdb.firebaseio.com", projectId: "mydairy-4fb6b",
            storageBucket: "mydairy-4fb6b.firebasestorage.app", messagingSenderId: "19962289772",
            appId: "1:19962289772:web:d5715b159dbfd4315dc249"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const getCollectionPath = (collectionName, userId) => isCanvasEnv ? `artifacts/${appId}/users/${userId}/${collectionName}` : `users/${userId}/${collectionName}`;

        const storage = {
            get: (key, def) => { try { const i = localStorage.getItem(key); return i ? JSON.parse(i) : def; } catch { return def; } },
            set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch { return false; } }
        };

        // --- Data Defaults ---
        const writingPrompts = ["What made you smile today?", "Write about a challenge you overcame recently.", "If today was a color, what would it be and why?", "What are three things you are grateful for right now?", "Describe a dream you had recently."];
        const diaryTemplates = [
            { name: "Gratitude Journal", content: "### Today I am grateful for:\n1. \n2. \n3. \n\n### The best part of my day was:\n\n### How I'll make tomorrow great:\n" },
            { name: "Morning Pages", content: "### Brain Dump (What's on my mind):\n\n### My main intention for today:\n\n### Things I must accomplish:\n- \n- " },
            { name: "Daily Reflection", content: "### What went well today:\n\n### What could have gone better:\n\n### What I learned:\n\n### Mood summary:\n" }
        ];

        // --- Fast UI Components ---
        const Toast = ({ message }) => {
            const [visible, setVisible] = useState(true);
            useEffect(() => { const t = setTimeout(() => setVisible(false), 2500); return () => clearTimeout(t); }, [message]);
            if (!visible) return null;
            return (
                <div className="toast-enter fixed bottom-10 left-1/2 transform -translate-x-1/2 z-[99999] glass-panel px-6 py-3 flex items-center gap-3 text-white font-medium shadow-2xl whitespace-nowrap">
                    <div className="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center"><i className="fas fa-check text-blue-400"></i></div>
                    {message}
                </div>
            );
        };

        const Modal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = 'Confirm', cancelText = 'Cancel', isDangerous = false }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9999] p-4">
                    <div className="glass-panel p-8 max-w-sm w-full transform transition-all text-white relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 ${isDangerous ? 'bg-red-500' : 'bg-blue-500'}`}></div>
                        <h2 className="text-2xl font-bold mb-3">{title}</h2>
                        <p className="opacity-80 mb-8 leading-relaxed">{message}</p>
                        <div className="flex gap-3 justify-end">
                            <button onClick={onCancel} className="px-5 py-2.5 rounded-xl glass-button text-sm font-medium">{cancelText}</button>
                            <button onClick={onConfirm} className={`px-5 py-2.5 rounded-xl text-white font-bold text-sm shadow-lg transition-transform hover:scale-105 ${isDangerous ? 'bg-red-500 hover:bg-red-600 shadow-red-500/30' : 'bg-blue-500 hover:bg-blue-600 shadow-blue-500/30'}`}>{confirmText}</button>
                        </div>
                    </div>
                </div>
            );
        };

        const PromptModal = ({ isOpen, title, onConfirm, onCancel, placeholder="Enter value..." }) => {
            const [val, setVal] = useState('');
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9999] p-4">
                    <div className="glass-panel p-8 max-w-sm w-full text-white relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                        <h2 className="text-2xl font-bold mb-6">{title}</h2>
                        <input type="text" value={val} onChange={e => setVal(e.target.value)} placeholder={placeholder} className="w-full p-4 rounded-xl mb-8 glass-input text-lg" autoFocus />
                        <div className="flex gap-3 justify-end">
                            <button onClick={onCancel} className="px-5 py-2.5 rounded-xl glass-button text-sm font-medium">Cancel</button>
                            <button onClick={() => { onConfirm(val); setVal(''); }} className="px-5 py-2.5 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-bold text-sm shadow-lg shadow-blue-500/30 transition-transform hover:scale-105">Confirm</button>
                        </div>
                    </div>
                </div>
            );
        }
        
        const DrawingCanvas = ({ onSave, onClose }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    canvas.width = window.innerWidth; canvas.height = window.innerHeight - 100;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }, []);
            
            const getCoordinates = (e) => (e.touches && e.touches.length > 0) ? { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY } : { clientX: e.nativeEvent.clientX, clientY: e.nativeEvent.clientY };
            
            const startDrawing = (e) => {
                setIsDrawing(true);
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();
                const { clientX, clientY } = getCoordinates(e);
                ctx.beginPath(); ctx.moveTo(clientX - rect.left, clientY - rect.top);
            };
            
            const draw = (e) => {
                if (!isDrawing) return;
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();
                const { clientX, clientY } = getCoordinates(e);
                ctx.lineTo(clientX - rect.left, clientY - rect.top);
                ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.stroke();
            };
            
            const stopDrawing = () => setIsDrawing(false);
            const handleSave = () => { onSave(canvasRef.current.toDataURL('image/png')); onClose(); };
            const handleClear = () => canvasRef.current.getContext('2d').clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
            
            return (
                <div className="fixed inset-0 modal-overlay z-[9000] flex flex-col p-4 sm:p-8">
                    <div className="flex justify-between items-center p-5 glass-panel rounded-b-none border-b-0 shadow-none">
                        <h2 className="text-xl font-bold flex items-center gap-3 text-white"><div className="w-8 h-8 rounded-full bg-pink-500/20 flex items-center justify-center text-pink-400"><i className="fas fa-palette"></i></div> Doodle</h2>
                        <div className="flex gap-2 sm:gap-3">
                            <button onClick={handleClear} className="w-10 h-10 rounded-full glass-button text-gray-300 hover:text-white"><i className="fas fa-trash"></i></button>
                            <button onClick={handleSave} className="px-5 py-2 bg-blue-500 hover:bg-blue-600 rounded-full text-white font-bold shadow-lg shadow-blue-500/30">Save</button>
                            <button onClick={onClose} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white"><i className="fas fa-times"></i></button>
                        </div>
                    </div>
                    <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} className="cursor-crosshair flex-1 touch-none glass-panel rounded-t-none border-t-0 bg-black/30"></canvas>
                </div>
            );
        };

        const ZenMode = ({ onClose }) => {
            const [breathingText, setBreathingText] = useState('Breathe In');
            useEffect(() => {
                const texts = ['Breathe In', 'Hold', 'Breathe Out', 'Hold'];
                let index = 0;
                const timer = setInterval(() => {
                    index = (index + 1) % texts.length;
                    setBreathingText(texts[index]);
                }, 4000); 
                return () => clearInterval(timer);
            }, []);
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9000] text-white">
                    <div className="text-center">
                        <div className="breathing-circle glass-panel mb-16 mx-auto flex items-center justify-center">
                            <i className="fas fa-leaf text-4xl opacity-50 text-green-400"></i>
                        </div>
                        <h2 className="text-5xl md:text-6xl font-light mb-12 tracking-[0.2em] drop-shadow-2xl">{breathingText}</h2>
                        <button onClick={onClose} className="px-10 py-4 glass-button rounded-full font-bold tracking-wider uppercase text-sm hover:bg-white/20 transition-all">End Session</button>
                    </div>
                </div>
            );
        };
        
        const VoiceRecorder = ({ onSave, onClose, showToast }) => {
            const [recording, setRecording] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const mediaRecorderRef = useRef(null);
            const streamRef = useRef(null);
            const chunksRef = useRef([]);
            
            const startRecording = async () => {
                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showToast('Microphone access is not supported here.'); return; }
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    chunksRef.current = [];
                    mediaRecorder.ondataavailable = (e) => chunksRef.current.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                        setAudioUrl(URL.createObjectURL(blob));
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start(); setRecording(true);
                } catch (err) { showToast('Microphone access denied.'); }
            };
            const stopRecording = () => { if (mediaRecorderRef.current) { mediaRecorderRef.current.stop(); setRecording(false); } };
            const handleSave = async () => {
                if (audioUrl) {
                    const response = await fetch(audioUrl); const blob = await response.blob();
                    const reader = new FileReader();
                    reader.onload = (e) => { onSave(e.target.result); onClose(); };
                    reader.readAsDataURL(blob);
                }
            };
            
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9000] p-4">
                    <div className="glass-panel p-10 max-w-sm w-full text-white text-center">
                        <div className="w-16 h-16 rounded-full bg-red-500/20 text-red-400 flex items-center justify-center mx-auto mb-6 text-2xl"><i className="fas fa-microphone-lines"></i></div>
                        <h2 className="text-2xl font-bold mb-8">Voice Memo</h2>
                        <div className="flex justify-center mb-10">
                            <button onClick={recording ? stopRecording : startRecording} className={`w-28 h-28 rounded-full flex items-center justify-center shadow-2xl transition-all duration-300 ${recording ? 'bg-red-500 animate-pulse shadow-[0_0_40px_rgba(239,68,68,0.6)] scale-110' : 'glass-button'}`}>
                                <i className={`fas ${recording ? 'fa-stop' : 'fa-microphone'} text-4xl ${recording ? 'text-white' : 'text-gray-300'}`}></i>
                            </button>
                        </div>
                        {audioUrl && <audio controls src={audioUrl} className="w-full mb-8 outline-none rounded-full glass-input"></audio>}
                        <div className="flex gap-4">
                            <button onClick={onClose} className="flex-1 py-3 glass-button rounded-xl font-bold text-sm">Cancel</button>
                            {audioUrl && <button onClick={handleSave} className="flex-1 py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-green-500/30 transition-transform hover:scale-105">Save</button>}
                        </div>
                    </div>
                </div>
            );
        };
        
        const getYouTubeEmbedUrl = (url) => {
            if (!url) return null;
            const regExp = /^(?:https?:\/\/)?(?:www\.)?(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|shorts\/))((\w|-){11})(?:\S+)?$/;
            const match = url.match(regExp);
            return (match && match[1].length === 11) ? `https://www.youtube.com/embed/${match[1]}` : null;
        };

        // --- MAIN APP COMPONENT ---
        const DiaryApp = () => {
            // App & Network State
            const [cloudStatus, setCloudStatus] = useState('checking'); 
            const [user, setUser] = useState(null);
            const [firebaseLibs, setFirebaseLibs] = useState(null);
            
            // Navigation & UI State
            const [currentRoute, setCurrentRoute] = useState('dashboard');
            const [toastMessage, setToastMessage] = useState('');
            const showToast = useCallback((msg) => setToastMessage(msg), []);
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString());
            const [viewMode, setViewMode] = useState('grid');
            const [focusMode, setFocusMode] = useState(false);
            const [privacyMode, setPrivacyMode] = useState(storage.get('privacyMode', false));
            
            // Security State
            const [appPin, setAppPin] = useState(storage.get('appPin', null));
            const [isUnlocked, setIsUnlocked] = useState(!storage.get('appPin', null));
            const [pinInput, setPinInput] = useState('');

            // Feature States
            const [urlInputMode, setUrlInputMode] = useState(null);
            const [tempUrl, setTempUrl] = useState('');

            // Data State (Optimistic loading from LocalStorage)
            const initialEntry = { 
                id: 1, title: 'Welcome to Uday\'s Diary', 
                content: 'Welcome to **Uday\'s Master Diary Pro**!\n\nI have fully integrated the **Media Integration Bar** you requested. When editing a note, simply click **Add Cover Image** or **Add YouTube Video** right below your title to directly paste a URL. It binds specifically to that single note.\n\nEnjoy writing, Uday!', 
                date: new Date().toISOString(), mood: 'happy', weather: 'sunny', isFavorite: true, color: 'blue', 
                location: 'Hyderabad, Telangana, India', tags: ['welcome'], notebook: 'Main Diary',
                backgroundImage: null, youtubeUrl: null
            };
            
            const [entries, setEntries] = useState(storage.get('diaryEntries', [initialEntry]));

                                            <span className="bg-white/10 border border-white/10 px-4 py-1.5 rounded-lg print:bg-gray-100 backdrop-blur-sm"><i className="fas fa-book-open mr-2 text-blue-400"></i>{currentEntry.notebook}</span>
                                            {currentEntry.location && <span className="bg-white/10 border border-white/10 px-4 py-1.5 rounded-lg backdrop-blur-sm"><i className="fas fa-location-dot text-red-400 mr-2"></i>{currentEntry.location}</span>}
                                            <span className="bg-white/10 border border-white/10 px-4 py-1.5 rounded-lg backdrop-blur-sm"><i className="far fa-clock text-green-400 mr-2"></i>{Math.max(1, Math.ceil((currentEntry.content ? currentEntry.content.trim().split(/\s+/).length : 0) / 200))} min</span>
                                        </div>
                                    </div>
                                    
                                    {currentEntry.images && currentEntry.images.length > 0 && (
                                        <div className="flex gap-5 mb-14 overflow-x-auto hide-scrollbar relative z-10 pb-4">
                                            {currentEntry.images.map((img, idx) => <img key={idx} src={img} className="h-80 w-auto object-cover rounded-3xl shadow-2xl border border-white/10 print:h-auto print:max-w-full print:border-none" />)}
                                        </div>
                                    )}

                                    {/* Reader YouTube Presentation */}
                                    {currentEntry.youtubeUrl && (
                                        <div className="mb-14 rounded-3xl overflow-hidden shadow-2xl aspect-video border border-white/10 relative z-10">
                                            <iframe className="w-full h-full" src={getYouTubeEmbedUrl(currentEntry.youtubeUrl)} frameBorder="0" allowFullScreen></iframe>
                                        </div>
                                    )}

                                    <div 
                                        className="markdown-body relative z-10 print:text-black print-content" 
                                        style={{ fontSize: textSize === 'small' ? '16px' : textSize === 'large' ? '22px' : '18px' }}
                                        dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(marked.parse(currentEntry.content || '')) }}
                                    />
                                    
                                    {currentEntry.tags && currentEntry.tags.length > 0 && (
                                        <div className="flex gap-3 flex-wrap mt-16 pt-8 border-t border-white/10 relative z-10 print:border-black/10">
                                            {currentEntry.tags.map((t, idx) => <span key={idx} className="text-sm font-bold text-gray-400 bg-white/5 px-4 py-2 rounded-xl">#{t}</span>)}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- INSIGHTS --- */}
                    {currentRoute === 'insights' && (
                        <div className="max-w-6xl mx-auto px-4 py-10 pb-20">
                            <div className="flex items-center gap-6 mb-12">
                                <button onClick={() => setCurrentRoute('dashboard')} className="w-12 h-12 rounded-full glass-button flex items-center justify-center text-xl"><i className="fas fa-arrow-left"></i></button>
                                <h2 className="text-4xl font-black tracking-tight text-white">Journey Insights</h2>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
                                <div className="glass-panel p-8 relative overflow-hidden group">
                                    <div className="absolute -right-6 -bottom-6 w-32 h-32 bg-blue-500/20 blur-2xl rounded-full group-hover:bg-blue-500/30 transition-colors"></div>
                                    <i className="fas fa-book absolute right-4 top-4 text-3xl text-blue-400 opacity-50"></i>
                                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 relative z-10">Entries</p>
                                    <p className="text-5xl font-black text-white relative z-10">{entries.length}</p>
                                </div>
                                <div className="glass-panel p-8 relative overflow-hidden group">
                                    <div className="absolute -right-6 -bottom-6 w-32 h-32 bg-orange-500/20 blur-2xl rounded-full group-hover:bg-orange-500/30 transition-colors"></div>
                                    <i className="fas fa-fire absolute right-4 top-4 text-3xl text-orange-400 opacity-50"></i>
                                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 relative z-10">Streak</p>
                                    <p className="text-5xl font-black text-white relative z-10">{dayStreak}</p>
                                </div>
                                <div className="glass-panel p-8 relative overflow-hidden group">
                                    <div className="absolute -right-6 -bottom-6 w-32 h-32 bg-purple-500/20 blur-2xl rounded-full group-hover:bg-purple-500/30 transition-colors"></div>
                                    <i className="fas fa-feather-pointed absolute right-4 top-4 text-3xl text-purple-400 opacity-50"></i>
                                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 relative z-10">Words</p>
                                    <p className="text-5xl font-black text-white relative z-10">{entries.reduce((s, e) => s + (e.content ? e.content.split(/\s+/).length : 0), 0)}</p>
                                </div>
                                <div className="glass-panel p-8 relative overflow-hidden group">
                                    <div className="absolute -right-6 -bottom-6 w-32 h-32 bg-yellow-500/20 blur-2xl rounded-full group-hover:bg-yellow-500/30 transition-colors"></div>
                                    <i className="fas fa-star absolute right-4 top-4 text-3xl text-yellow-400 opacity-50"></i>
                                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 relative z-10">Favorites</p>
                                    <p className="text-5xl font-black text-white relative z-10">{entries.filter(e => e.isFavorite).length}</p>
                                </div>
                            </div>
                            
                            <div className="glass-panel p-10">
                                <h3 className="text-2xl font-bold mb-8 flex items-center gap-3 text-white"><i className="fas fa-calendar-alt text-blue-400"></i> Activity Map</h3>
                                <div className="overflow-x-auto hide-scrollbar pb-4">
                                    <div className="grid grid-rows-7 grid-flow-col gap-2 min-w-max">
                                        {[...Array(365)].map((_, i) => {
                                            const date = new Date(); date.setDate(date.getDate() - 364 + i);
                                            const count = entries.filter(e => new Date(e.date).toDateString() === date.toDateString()).length;
                                            let bg = 'bg-white/5 border border-white/5';
                                            if (count === 1) bg = 'bg-blue-500/40 border border-blue-400/50 shadow-[0_0_10px_rgba(59,130,246,0.3)]';
                                            if (count === 2) bg = 'bg-blue-500/70 border border-blue-400/80 shadow-[0_0_15px_rgba(59,130,246,0.5)]';
                                            if (count >= 3) bg = 'bg-blue-400 border border-blue-300 shadow-[0_0_20px_rgba(59,130,246,0.8)] scale-110 z-10 relative';
                                            return <div key={i} className={`w-4 h-4 rounded-sm ${bg} transition-all duration-300 hover:scale-[2] hover:z-20 cursor-crosshair`} title={`${date.toLocaleDateString()}: ${count} entries`}></div>;
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- TRASH --- */}
                    {currentRoute === 'trash' && (
                        <div className="max-w-5xl mx-auto px-4 py-10 pb-20">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-6">
                                <div className="flex items-center gap-6">
                                    <button onClick={() => setCurrentRoute('dashboard')} className="w-12 h-12 rounded-full glass-button flex items-center justify-center text-xl"><i className="fas fa-arrow-left"></i></button>
                                    <div>
                                        <h2 className="text-4xl font-black tracking-tight text-white">Trash Bin</h2>
                                        <p className="text-gray-400 font-medium mt-1">{trash.length} items waiting for permanent deletion.</p>
                                    </div>
                                </div>
                                {trash.length > 0 && <button onClick={() => setDeleteModal({ isOpen: true, entryId: 'empty-trash' })} className="px-6 py-3 bg-red-500 hover:bg-red-600 rounded-xl text-white font-bold shadow-lg shadow-red-500/30 transition-transform hover:-translate-y-1 flex items-center gap-2"><i className="fas fa-fire"></i> Empty Bin</button>}
                            </div>
                            
                            {trash.length === 0 ? (
                                <div className="text-center py-24 glass-panel">
                                    <div className="w-24 h-24 rounded-full bg-white/5 border border-white/10 flex items-center justify-center mx-auto mb-6">
                                        <i className="fas fa-trash-can text-4xl text-gray-500"></i>
                                    </div>
                                    <h3 className="text-2xl font-bold text-white">It's clean here</h3>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {trash.map(entry => (
                                        <div key={entry.id} className="glass-panel p-6 flex flex-col sm:flex-row justify-between sm:items-center gap-6 group hover:bg-white/5 transition-colors">
                                            <div>
                                                <h3 className="font-bold text-xl mb-2 text-white">{entry.title || 'Untitled'}</h3>
                                                <p className="text-sm text-red-400 font-bold bg-red-500/10 inline-block px-3 py-1 rounded-lg"><i className="far fa-clock mr-1"></i> Deleted: {new Date(entry.deletedAt).toLocaleDateString()}</p>
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => restoreEntry(entry.id)} className="px-5 py-2.5 bg-green-500/20 hover:bg-green-500/30 border border-green-500/30 text-green-400 rounded-xl font-bold transition-colors shadow-inner"><i className="fas fa-rotate-left mr-2"></i> Restore</button>
                                                <button onClick={() => permanentlyDeleteEntry(entry.id)} className="px-5 py-2.5 bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 text-red-400 rounded-xl font-bold transition-colors shadow-inner"><i className="fas fa-trash-can mr-2"></i> Delete</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* --- MODALS & SETTINGS --- */}
                    {showTemplateModal && (
                        <div className="fixed inset-0 modal-overlay flex items-center justify-center z-[9000] p-4">
                            <div className="glass-panel p-8 max-w-md w-full shadow-2xl text-white relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-indigo-500"></div>
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-bold"><i className="fas fa-layer-group text-indigo-400 mr-3"></i> Templates</h2>
                                    <button onClick={() => setShowTemplateModal(false)} className="w-10 h-10 glass-button rounded-full"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="space-y-3">
                                    {diaryTemplates.map(t => (
                                        <button key={t.name} onClick={() => insertTemplate(t)} className="w-full text-left p-5 glass-button rounded-xl font-bold text-lg hover:border-indigo-500/50 hover:bg-indigo-500/10">
                                            {t.name}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay flex justify-end z-[9000]">
                            <div className="bg-black/60 backdrop-blur-3xl border-l border-white/10 p-8 w-full max-w-md h-full shadow-[-20px_0_50px_rgba(0,0,0,0.5)] overflow-y-auto hide-scrollbar">
                                <div className="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                                    <h2 className="text-3xl font-black text-white tracking-tight">Settings</h2>
                                    <button onClick={() => setShowSettings(false)} className="w-12 h-12 glass-button rounded-full flex items-center justify-center text-white"><i className="fas fa-times text-xl"></i></button>
                                </div>
                                
                                <div className="space-y-8">
                                    <div className="glass-panel p-6 rounded-3xl">
                                        <h3 className="text-xs font-black text-blue-400 mb-5 uppercase tracking-[0.2em]">Privacy Vault</h3>
                                        <p className="text-sm text-gray-300 mb-5 font-medium">Require a 4-digit PIN to open the diary.</p>
                                        {appPin ? (
                                            <button onClick={() => { storage.set('appPin', null); setAppPin(null); showToast('PIN Removed'); }} className="w-full py-3 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 rounded-xl font-bold transition-colors">Disable PIN Lock</button>
                                        ) : (
                                            <button onClick={() => { 
                                                setPromptModal({ 
                                                    isOpen: true, title: 'Set 4-Digit PIN', placeholder: 'e.g. 1234',
                                                    onConfirm: (p) => { 
                                                        if(p && /^\d{4}$/.test(p)) { storage.set('appPin', p); setAppPin(p); showToast('Vault Locked'); } 
                                                        else showToast('Must be exactly 4 digits');
                                                        setPromptModal({isOpen: false});
                                                    }, onCancel: () => setPromptModal({isOpen: false}) 
                                                }); 
                                            }} className="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-500/30 transition-transform hover:-translate-y-1">Enable PIN Lock</button>
                                        )}
                                    </div>
                                    
                                    <div className="glass-panel p-6 rounded-3xl">
                                        <h3 className="text-xs font-black text-purple-400 mb-5 uppercase tracking-[0.2em]">Appearance</h3>
                                        <label className="block text-sm text-white font-bold mb-3">Diary Name</label>
                                        <input type="text" value={appName} onChange={(e) => { setAppName(e.target.value); storage.set('appName', e.target.value); }} className="w-full px-5 py-4 mb-6 glass-input rounded-xl text-white font-bold" />
                                        
                                        <label className="block text-sm text-white font-bold mb-3">Reader Text Size</label>
                                        <div className="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-white/5">
                                            {['small', 'normal', 'large'].map(s => (
                                                <button key={s} onClick={() => { setTextSize(s); storage.set('textSize', s); }} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all capitalize ${textSize === s ? 'bg-white/20 text-white shadow-md' : 'text-gray-400 hover:text-white'}`}>{s}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="glass-panel p-6 rounded-3xl">
                                        <h3 className="text-xs font-black text-green-400 mb-5 uppercase tracking-[0.2em]">Notebooks</h3>
                                        <div className="flex flex-wrap gap-2 mb-5">
                                            {notebooks.map(nb => <span key={nb} className="px-3 py-1.5 bg-white/10 rounded-lg text-sm font-bold text-white border border-white/5">{nb}</span>)}
                                        </div>
                                        <button onClick={() => { 
                                            setPromptModal({ 
                                                isOpen: true, title: 'New Notebook Name', placeholder: 'e.g. Dreams',
                                                onConfirm: (n) => { 
                                                    if(n && !notebooks.includes(n)) { const newNbs = [...notebooks, n]; setNotebooks(newNbs); storage.set('diaryNotebooks', newNbs); showToast('Notebook added'); } 
                                                    setPromptModal({isOpen: false});
                                                }, onCancel: () => setPromptModal({isOpen: false}) 
                                            }); 
                                        }} className="w-full py-3 glass-button rounded-xl text-white font-bold transition-colors"><i className="fas fa-plus mr-2"></i> Create Notebook</button>
                                    </div>
                                    
                                    <div className="glass-panel p-6 rounded-3xl">
                                        <h3 className="text-xs font-black text-orange-400 mb-5 uppercase tracking-[0.2em]">Data Management</h3>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => { exportEntries(); setShowSettings(false); }} className="py-4 glass-button rounded-xl text-white font-bold transition-colors flex flex-col items-center gap-2"><i className="fas fa-cloud-arrow-down text-2xl"></i> Export JSON</button>
                                            <button onClick={() => { importEntries(); setShowSettings(false); }} className="py-4 glass-button rounded-xl text-white font-bold transition-colors flex flex-col items-center gap-2"><i className="fas fa-cloud-arrow-up text-2xl"></i> Import JSON</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <PromptModal isOpen={promptModal.isOpen} title={promptModal.title} placeholder={promptModal.placeholder} onConfirm={promptModal.onConfirm} onCancel={promptModal.onCancel} />
                    <Modal isOpen={deleteModal.isOpen} title="Confirm Action" message={deleteModal.entryId === 'empty-trash' ? 'Are you sure you want to permanently delete all items in the trash? This action cannot be undone.' : 'Are you sure you want to move this entry to the trash?'} onConfirm={() => { if (deleteModal.entryId === 'empty-trash') emptyTrash(); else { deleteEntry(deleteModal.entryId); setCurrentEntry(null); setCurrentRoute('dashboard'); } setDeleteModal({ isOpen: false, entryId: null }); }} onCancel={() => setDeleteModal({ isOpen: false, entryId: null })} confirmText={deleteModal.entryId === 'empty-trash' ? "Empty Trash" : "Move to Trash"} isDangerous />
                    {toastMessage && <Toast message={toastMessage} />}
                    {showZenMode && <ZenMode onClose={() => setShowZenMode(false)} />}
                    {showDrawing && <DrawingCanvas onSave={url => { setCurrentEntry({...currentEntry, images: [...(currentEntry.images||[]), url]}); showToast('Doodle saved to entry'); }} onClose={() => setShowDrawing(false)} />}
                    {showVoiceRecorder && <VoiceRecorder onSave={data => { setCurrentEntry({...currentEntry, audioMemo: data}); showToast('Audio memo saved to entry'); }} onClose={() => setShowVoiceRecorder(false)} showToast={showToast} />}
                </div>
            );
        };
        
        const root = createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <DiaryApp />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
